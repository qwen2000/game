<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>工作笔记 | WorkNote</title>
    <!-- [保持原有 head 内容] -->
    <style>
        /* [保持原有样式，添加以下新样式] */
        
        /* 删除按钮 */
        .delete-notebook-btn {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            border: none;
            background: transparent;
            cursor: pointer;
            opacity: 0;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .notebook-item:hover .delete-notebook-btn {
            opacity: 1;
        }

        .delete-notebook-btn:hover {
            background: #ffebee;
        }

        .note-actions-row {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .delete-note-btn {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            border: none;
            background: transparent;
            cursor: pointer;
            opacity: 0;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.9rem;
        }

        .note-item:hover .delete-note-btn {
            opacity: 1;
        }

        .delete-note-btn:hover {
            background: #ffebee;
        }

        /* 导出样式 */
        .export-cover {
            text-align: center;
            padding: 200px 0;
            page-break-after: always;
        }

        .export-cover h1 {
            font-size: 48px;
            color: var(--primary-dark);
            margin-bottom: 40px;
        }

        .export-meta {
            color: #666;
            font-size: 16px;
            margin-bottom: 15px;
        }

        .export-note {
            margin-bottom: 50px;
            padding-bottom: 30px;
            border-bottom: 1px solid #eee;
            page-break-inside: avoid;
        }

        .export-note-title {
            font-size: 24px;
            color: var(--primary-dark);
            margin-bottom: 10px;
            font-weight: 500;
        }

        .export-note-time {
            color: #999;
            font-size: 13px;
            margin-bottom: 20px;
        }

        /* 编辑器按钮禁用状态 */
        .editor-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
    </style>
</head>
<body>
    <!-- [保持原有 body 结构，修改以下部分] -->
    
    <!-- 头部 -->
    <header>
        <div class="header-content">
            <h1>📓 工作笔记</h1>
            <div class="header-actions">
                <button class="icon-btn" onclick="openSettings()" title="设置">⚙️</button>
                <button class="icon-btn" onclick="syncToGithub()" title="同步到GitHub">☁️</button>
            </div>
        </div>
    </header>

    <!-- 主容器 -->
    <div class="app-container">
        <!-- 侧边栏 -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <div class="sidebar-title">笔记本</div>
                <button class="new-notebook-btn" onclick="openNewNotebookModal()">
                    <span>+</span>
                    <span>新建笔记本</span>
                </button>
            </div>
            <div class="notebook-list" id="notebookList"></div>
        </aside>

        <!-- 主内容 -->
        <main class="main-content">
            <div class="notes-header">
                <div class="notes-title" id="currentNotebookName">请选择笔记本</div>
                <div class="notes-actions">
                    <button class="sort-btn" onclick="toggleSort()" id="sortBtn">
                        📅 最近修改
                    </button>
                    <button class="sort-btn" onclick="exportNotebookPDF()" id="exportNotebookBtn" disabled>
                        📄 导出笔记本
                    </button>
                    <button class="new-note-btn" onclick="createNewNote()" id="newNoteBtn" disabled>
                        <span>+</span>
                        <span>新建笔记</span>
                    </button>
                </div>
            </div>
            <div class="notes-list" id="notesList">
                <div class="empty-state">
                    <div class="empty-icon">📓</div>
                    <p>选择或创建一个笔记本开始</p>
                </div>
            </div>
        </main>
    </div>

    <!-- 编辑器页面 -->
    <div class="editor-page" id="editorPage">
        <div class="editor-header">
            <button class="editor-btn secondary" onclick="closeEditor()">
                ← 返回
            </button>
            <div class="editor-title-input">
                <input type="text" id="noteTitleInput" placeholder="笔记标题">
            </div>
            <div class="editor-actions">
                <button class="editor-btn secondary" onclick="configureImageUpload()" id="imageConfigBtn">
                    🖼️ 图床配置
                </button>
                <button class="editor-btn secondary" onclick="insertImage()" id="insertImageBtn" disabled>
                    🖼️ 插入图片
                </button>
                <button class="editor-btn secondary" onclick="exportNotePDF()">
                    📄 导出PDF
                </button>
                <button class="editor-btn save" onclick="saveNote()">
                    💾 保存
                </button>
            </div>
        </div>
        <div class="editor-container">
            <div class="editor-pane">
                <textarea id="markdownEditor"></textarea>
            </div>
        </div>
    </div>

    <!-- [保持其他弹窗不变] -->

    <script>
        // ============================================
        // 数据存储
        // ============================================
        
        let notebooks = JSON.parse(localStorage.getItem('worknote_notebooks')) || [];
        let notes = JSON.parse(localStorage.getItem('worknote_notes')) || [];
        
        let currentNotebookId = null;
        let currentNoteId = null;
        let sortBy = 'updated';
        let easyMDE = null;
        
        let githubConfig = {
            token: localStorage.getItem('worknote_github_token') || '',
            repo: localStorage.getItem('worknote_github_repo') || '',
            branch: localStorage.getItem('worknote_github_branch') || 'main'
        };
        
        // 图片上传配置（独立）
        let imageConfig = {
            token: localStorage.getItem('worknote_image_token') || '',
            repo: localStorage.getItem('worknote_image_repo') || '',
            branch: localStorage.getItem('worknote_image_branch') || 'main'
        };
        
        // ============================================
        // 初始化
        // ============================================
        
        document.addEventListener('DOMContentLoaded', () => {
            renderNotebookList();
            loadGithubSettings();
        });
        
        // ============================================
        // 笔记本管理
        // ============================================
        
        function openNewNotebookModal() {
            document.getElementById('notebookNameInput').value = '';
            document.getElementById('newNotebookModal').classList.add('active');
            setTimeout(() => document.getElementById('notebookNameInput').focus(), 100);
        }
        
        function createNotebook() {
            const name = document.getElementById('notebookNameInput').value.trim();
            if (!name) {
                showToast('请输入笔记本名称');
                return;
            }
            
            const notebook = {
                id: Date.now().toString(),
                name: name,
                createdAt: new Date().toISOString(),
                updatedAt: new Date().toISOString()
            };
            
            notebooks.push(notebook);
            saveData();
            
            closeModal('newNotebookModal');
            renderNotebookList();
            selectNotebook(notebook.id);
            showToast('笔记本创建成功');
        }
        
        function deleteNotebook(id) {
            const notebook = notebooks.find(n => n.id === id);
            const noteCount = notes.filter(n => n.notebookId === id).length;
            
            if (!confirm(`确定删除笔记本"${notebook.name}"？\n其中包含 ${noteCount} 篇笔记，此操作不可恢复！`)) {
                return;
            }
            
            notebooks = notebooks.filter(n => n.id !== id);
            notes = notes.filter(n => n.notebookId !== id);
            
            if (currentNotebookId === id) {
                currentNotebookId = null;
                document.getElementById('currentNotebookName').textContent = '请选择笔记本';
                document.getElementById('newNoteBtn').disabled = true;
                document.getElementById('exportNotebookBtn').disabled = true;
                renderNotesList();
            }
            
            saveData();
            renderNotebookList();
            showToast('笔记本已删除');
        }
        
        function renderNotebookList() {
            const container = document.getElementById('notebookList');
            
            if (notebooks.length === 0) {
                container.innerHTML = '<div style="padding: 40px; text-align: center; color: var(--text-secondary);">还没有笔记本</div>';
                return;
            }
            
            container.innerHTML = notebooks.map(nb => {
                const noteCount = notes.filter(n => n.notebookId === nb.id).length;
                const isActive = nb.id === currentNotebookId;
                
                return `
                    <div class="notebook-item ${isActive ? 'active' : ''}" onclick="selectNotebook('${nb.id}')">
                        <div class="notebook-icon">📓</div>
                        <div class="notebook-info">
                            <div class="notebook-name">${escapeHtml(nb.name)}</div>
                            <div class="notebook-count">${noteCount} 篇笔记</div>
                        </div>
                        <button class="delete-notebook-btn" onclick="event.stopPropagation(); deleteNotebook('${nb.id}')" title="删除笔记本">
                            🗑️
                        </button>
                    </div>
                `;
            }).join('');
        }
        
        function selectNotebook(id) {
            currentNotebookId = id;
            const notebook = notebooks.find(n => n.id === id);
            
            document.getElementById('currentNotebookName').textContent = notebook ? notebook.name : '请选择笔记本';
            document.getElementById('newNoteBtn').disabled = !notebook;
            document.getElementById('exportNotebookBtn').disabled = !notebook;
            
            renderNotebookList();
            renderNotesList();
        }
        
        // ============================================
        // 笔记管理
        // ============================================
        
        function createNewNote() {
            if (!currentNotebookId) return;
            
            currentNoteId = null;
            document.getElementById('noteTitleInput').value = '';
            
            initEditor('');
            
            document.getElementById('editorPage').classList.add('active');
        }
        
        function editNote(id) {
            const note = notes.find(n => n.id === id);
            if (!note) return;
            
            currentNoteId = id;
            document.getElementById('noteTitleInput').value = note.title || '';
            
            initEditor(note.content || '');
            
            document.getElementById('editorPage').classList.add('active');
        }
        
        function deleteNote(id) {
            if (!confirm('确定删除这篇笔记？此操作不可恢复！')) {
                return;
            }
            
            notes = notes.filter(n => n.id !== id);
            
            if (currentNoteId === id) {
                closeEditor();
            }
            
            saveData();
            renderNotesList();
            renderNotebookList();
            showToast('笔记已删除');
        }
        
        function initEditor(content) {
            if (easyMDE) {
                easyMDE.toTextArea();
                easyMDE = null;
            }
            
            const textarea = document.getElementById('markdownEditor');
            textarea.value = content;
            
            easyMDE = new EasyMDE({
                element: textarea,
                spellChecker: false,
                autosave: { enabled: false },
                placeholder: '开始写作... 支持 Markdown 语法',
                toolbar: [
                    'bold', 'italic', 'heading', '|',
                    'quote', 'unordered-list', 'ordered-list', '|',
                    'link', 'image', 'code', 'table', '|',
                    'preview', 'side-by-side', 'fullscreen', '|',
                    'guide'
                ],
                status: false,
                minHeight: 'calc(100vh - 200px)'
            });
            
            updateImageButtonState();
        }
        
        function saveNote() {
            const title = document.getElementById('noteTitleInput').value.trim() || '无标题';
            const content = easyMDE.value();
            const now = new Date().toISOString();
            
            if (currentNoteId) {
                const index = notes.findIndex(n => n.id === currentNoteId);
                notes[index] = {
                    ...notes[index],
                    title,
                    content,
                    updatedAt: now
                };
                
                const note = notes.splice(index, 1)[0];
                notes.unshift(note);
            } else {
                const note = {
                    id: Date.now().toString(),
                    notebookId: currentNotebookId,
                    title,
                    content,
                    createdAt: now,
                    updatedAt: now
                };
                notes.unshift(note);
                currentNoteId = note.id;
            }
            
            saveData();
            showToast('保存成功');
        }
        
        function closeEditor() {
            document.getElementById('editorPage').classList.remove('active');
            renderNotesList();
            
            if (easyMDE) {
                easyMDE.toTextArea();
                easyMDE = null;
            }
        }
        
        function toggleSort() {
            sortBy = sortBy === 'updated' ? 'created' : 'updated';
            document.getElementById('sortBtn').textContent = sortBy === 'updated' ? '📅 最近修改' : '📅 创建时间';
            renderNotesList();
        }
        
        function renderNotesList() {
            const container = document.getElementById('notesList');
            
            if (!currentNotebookId) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-icon">📓</div>
                        <p>选择或创建一个笔记本开始</p>
                    </div>
                `;
                return;
            }
            
            let notebookNotes = notes.filter(n => n.notebookId === currentNotebookId);
            
            if (sortBy === 'created') {
                notebookNotes.sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt));
            }
            
            if (notebookNotes.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-icon">📝</div>
                        <p>还没有笔记，点击右上角新建</p>
                    </div>
                `;
                return;
            }
            
            container.innerHTML = notebookNotes.map(note => {
                const updated = formatDateTime(note.updatedAt);
                const preview = note.content ? note.content.substring(0, 150).replace(/[#*`]/g, '') + '...' : '无内容';
                
                return `
                    <div class="note-item" onclick="editNote('${note.id}')">
                        <div class="note-header">
                            <div class="note-title">${escapeHtml(note.title)}</div>
                            <div class="note-actions-row">
                                <div class="note-time">
                                    <span>🕐</span>
                                    <span>${updated}</span>
                                </div>
                                <button class="delete-note-btn" onclick="event.stopPropagation(); deleteNote('${note.id}')" title="删除笔记">
                                    🗑️
                                </button>
                            </div>
                        </div>
                        <div class="note-preview">${escapeHtml(preview)}</div>
                    </div>
                `;
            }).join('');
        }
        
        // ============================================
        // 图片上传
        // ============================================
        
        function configureImageUpload() {
            const token = prompt('GitHub Token (ghp_...):', imageConfig.token);
            if (token === null) return;
            
            const repo = prompt('图片仓库 (用户名/仓库名):', imageConfig.repo);
            if (repo === null) return;
            
            const branch = prompt('分支 (默认 main):', imageConfig.branch) || 'main';
            
            imageConfig.token = token.trim();
            imageConfig.repo = repo.trim();
            imageConfig.branch = branch.trim();
            
            localStorage.setItem('worknote_image_token', imageConfig.token);
            localStorage.setItem('worknote_image_repo', imageConfig.repo);
            localStorage.setItem('worknote_image_branch', imageConfig.branch);
            
            updateImageButtonState();
            showToast('图床配置已保存');
        }
        
        function updateImageButtonState() {
            const btn = document.getElementById('insertImageBtn');
            const hasConfig = imageConfig.token && imageConfig.repo;
            btn.disabled = !hasConfig;
            btn.textContent = hasConfig ? '🖼️ 插入图片' : '🖼️ 请先配置';
        }
        
        async function insertImage() {
            if (!imageConfig.token || !imageConfig.repo) {
                configureImageUpload();
                return;
            }
            
            const input = document.createElement('input');
            input.type = 'file';
            input.accept = 'image/*';
            input.multiple = true;
            
            input.onchange = async (e) => {
                const files = Array.from(e.target.files);
                if (files.length === 0) return;
                
                showToast(`正在上传 ${files.length} 张图片...`);
                
                for (const file of files) {
                    try {
                        const url = await uploadImageToGithub(file);
                        const cm = easyMDE.codemirror;
                        const cursor = cm.getCursor();
                        const imageMarkdown = `\n![${file.name}](${url})\n`;
                        cm.replaceRange(imageMarkdown, cursor);
                        showToast('图片已插入');
                    } catch (err) {
                        showToast('上传失败: ' + err.message);
                    }
                }
            };
            
            input.click();
        }
        
        async function uploadImageToGithub(file) {
            const compressed = await compressImage(file, 1600, 0.85);
            const base64Data = compressed.split(',')[1];
            
            const now = new Date();
            const dateStr = `${now.getFullYear()}${pad(now.getMonth()+1)}${pad(now.getDate())}`;
            const random = Math.random().toString(36).substring(2, 10);
            const ext = file.name.split('.').pop() || 'jpg';
            const filename = `images/${dateStr}_${random}.${ext}`;
            
            const response = await fetch(`https://api.github.com/repos/${imageConfig.repo}/contents/${filename}`, {
                method: 'PUT',
                headers: {
                    'Authorization': `token ${imageConfig.token}`,
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    message: `Add image: ${file.name}`,
                    content: base64Data,
                    branch: imageConfig.branch
                })
            });
            
            if (!response.ok) {
                const error = await response.json();
                throw new Error(error.message || 'Upload failed');
            }
            
            return `https://cdn.jsdelivr.net/gh/${imageConfig.repo}@${imageConfig.branch}/${filename}`;
        }
        
        function compressImage(file, maxWidth = 1600, quality = 0.85) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = (e) => {
                    const img = new Image();
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        let width = img.width;
                        let height = img.height;
                        
                        if (width > maxWidth) {
                            height = (maxWidth / width) * height;
                            width = maxWidth;
                        }
                        
                        canvas.width = Math.floor(width);
                        canvas.height = Math.floor(height);
                        
                        const ctx = canvas.getContext('2d');
                        ctx.fillStyle = '#ffffff';
                        ctx.fillRect(0, 0, canvas.width, canvas.height);
                        ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                        
                        resolve(canvas.toDataURL('image/jpeg', quality));
                    };
                    img.onerror = reject;
                    img.src = e.target.result;
                };
                reader.onerror = reject;
                reader.readAsDataURL(file);
            });
        }
        
        // ============================================
        // PDF 导出
        // ============================================
        
        async function exportNotePDF() {
            const title = document.getElementById('noteTitleInput').value.trim() || '无标题';
            const content = easyMDE.value();
            const now = new Date();
            
            const container = document.createElement('div');
            container.className = 'export-preview-container';
            container.innerHTML = `
                <div class="export-preview-content">
                    <h1>${escapeHtml(title)}</h1>
                    <div class="note-meta">
                        导出时间：${formatDateTime(now.toISOString())}
                    </div>
                    <div class="markdown-body">${marked.parse(content)}</div>
                </div>
            `;
            document.body.appendChild(container);
            
            container.querySelectorAll('pre code').forEach((block) => {
                hljs.highlightElement(block);
            });
            
            const { jsPDF } = window.jspdf;
            const pdf = new jsPDF('p', 'mm', 'a4');
            
            const canvas = await html2canvas(container, {
                scale: 2,
                useCORS: true,
                backgroundColor: '#ffffff'
            });
            
            const imgData = canvas.toDataURL('image/png');
            const imgWidth = 210 - 20 * 2;
            const imgHeight = (canvas.height * imgWidth) / canvas.width;
            
            let heightLeft = imgHeight;
            let position = 0;
            
            pdf.addImage(imgData, 'PNG', 20, 20, imgWidth, imgHeight);
            heightLeft -= 297 - 40;
            
            while (heightLeft > 0) {
                position = heightLeft - imgHeight + 20;
                pdf.addPage();
                pdf.addImage(imgData, 'PNG', 20, position, imgWidth, imgHeight);
                heightLeft -= 297 - 40;
            }
            
            pdf.save(`${title}_${formatDateFile(now)}.pdf`);
            
            document.body.removeChild(container);
            showToast('PDF 导出成功');
        }
        
        async function exportNotebookPDF() {
            if (!currentNotebookId) return;
            
            const notebook = notebooks.find(n => n.id === currentNotebookId);
            const notebookNotes = notes.filter(n => n.notebookId === currentNotebookId)
                .sort((a, b) => new Date(b.updatedAt) - new Date(a.updatedAt));
            
            if (notebookNotes.length === 0) {
                showToast('笔记本为空');
                return;
            }
            
            showLoading(true);
            
            const container = document.createElement('div');
            container.className = 'export-preview-container';
            
            let html = `
                <div class="export-cover">
                    <h1>${escapeHtml(notebook.name)}</h1>
                    <div class="export-meta">共 ${notebookNotes.length} 篇笔记</div>
                    <div class="export-meta">导出时间：${formatDateTime(new Date().toISOString())}</div>
                </div>
            `;
            
            for (const note of notebookNotes) {
                html += `
                    <div class="export-note">
                        <div class="export-note-title">${escapeHtml(note.title)}</div>
                        <div class="export-note-time">最后修改：${formatDateTime(note.updatedAt)}</div>
                        <div class="markdown-body">${marked.parse(note.content || '')}</div>
                    </div>
                `;
            }
            
            container.innerHTML = html;
            document.body.appendChild(container);
            
            container.querySelectorAll('pre code').forEach(block => {
                hljs.highlightElement(block);
            });
            
            const { jsPDF } = window.jspdf;
            const pdf = new jsPDF('p', 'mm', 'a4');
            
            const canvas = await html2canvas(container, {
                scale: 2,
                useCORS: true,
                backgroundColor: '#ffffff',
                windowWidth: 794
            });
            
            const imgData = canvas.toDataURL('image/png');
            const imgWidth = 210 - 20 * 2;
            const imgHeight = (canvas.height * imgWidth) / canvas.width;
            
            let heightLeft = imgHeight;
            let position = 0;
            
            pdf.addImage(imgData, 'PNG', 20, 20, imgWidth, imgHeight);
            heightLeft -= 297 - 40;
            
            while (heightLeft > 0) {
                position = heightLeft - imgHeight + 20;
                pdf.addPage();
                pdf.addImage(imgData, 'PNG', 20, position, imgWidth, imgHeight);
                heightLeft -= 297 - 40;
            }
            
            pdf.save(`${notebook.name}_${formatDateFile(new Date())}.pdf`);
            
            document.body.removeChild(container);
            showLoading(false);
            showToast('笔记本导出成功');
        }
        
        // ============================================
        // GitHub 同步
        // ============================================
        
        function openSettings() {
            document.getElementById('settingsPanel').classList.add('active');
        }
        
        function closeSettings() {
            document.getElementById('settingsPanel').classList.remove('active');
        }
        
        function loadGithubSettings() {
            document.getElementById('githubToken').value = githubConfig.token;
            document.getElementById('githubRepo').value = githubConfig.repo;
            document.getElementById('githubBranch').value = githubConfig.branch;
        }
        
        function saveGithubSettings() {
            githubConfig.token = document.getElementById('githubToken').value.trim();
            githubConfig.repo = document.getElementById('githubRepo').value.trim();
            githubConfig.branch = document.getElementById('githubBranch').value.trim() || 'main';
            
            localStorage.setItem('worknote_github_token', githubConfig.token);
            localStorage.setItem('worknote_github_repo', githubConfig.repo);
            localStorage.setItem('worknote_github_branch', githubConfig.branch);
            
            testGithubConnection();
        }
        
        async function testGithubConnection() {
            if (!githubConfig.token || !githubConfig.repo) {
                showToast('请填写完整的 GitHub 配置');
                return;
            }
            
            showLoading(true);
            
            try {
                const response = await fetch(`https://api.github.com/repos/${githubConfig.repo}`, {
                    headers: {
                        'Authorization': `token ${githubConfig.token}`,
                        'Accept': 'application/vnd.github.v3+json'
                    }
                });
                
                if (!response.ok) throw new Error('连接失败');
                
                showToast('✅ GitHub 连接成功');
                closeSettings();
                
            } catch (err) {
                showToast('❌ 连接失败：' + err.message);
            } finally {
                showLoading(false);
            }
        }
        
        async function syncToGithub() {
            if (!githubConfig.token || !githubConfig.repo) {
                showToast('请先配置 GitHub');
                openSettings();
                return;
            }
            
            showLoading(true);
            
            try {
                const readRes = await fetch(`https://api.github.com/repos/${githubConfig.repo}/contents/worknote-data.json`, {
                    headers: { 'Authorization': `token ${githubConfig.token}` }
                });
                
                let sha = null;
                if (readRes.ok) {
                    const data = await readRes.json();
                    sha = data.sha;
                }
                
                const saveData = {
                    notebooks,
                    notes,
                    syncedAt: new Date().toISOString()
                };
                
                const content = btoa(unescape(encodeURIComponent(JSON.stringify(saveData, null, 2))));
                
                const body = {
                    message: `Sync worknote data: ${new Date().toLocaleString()}`,
                    content: content,
                    branch: githubConfig.branch
                };
                
                if (sha) body.sha = sha;
                
                const saveRes = await fetch(`https://api.github.com/repos/${githubConfig.repo}/contents/worknote-data.json`, {
                    method: 'PUT',
                    headers: {
                        'Authorization': `token ${githubConfig.token}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(body)
                });
                
                if (!saveRes.ok) throw new Error('保存失败');
                
                showToast('✅ 同步成功');
                
            } catch (err) {
                console.error(err);
                showToast('❌ 同步失败：' + err.message);
            } finally {
                showLoading(false);
            }
        }
        
        // ============================================
        // 数据导入导出
        // ============================================
        
        function exportAllData() {
            const data = {
                notebooks,
                notes,
                exportedAt: new Date().toISOString()
            };
            
            const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `worknote-backup-${formatDateFile(new Date())}.json`;
            a.click();
            URL.revokeObjectURL(url);
            
            showToast('数据已导出');
        }
        
        function importData() {
            document.getElementById('importFile').click();
        }
        
        function handleImport(event) {
            const file = event.target.files[0];
            if (!file) return;
            
            const reader = new FileReader();
            reader.onload = (e) => {
                try {
                    const data = JSON.parse(e.target.result);
                    
                    if (confirm(`确定导入？这将覆盖现有 ${notebooks.length} 个笔记本和 ${notes.length} 篇笔记`)) {
                        notebooks = data.notebooks || [];
                        notes = data.notes || [];
                        saveData();
                        
                        currentNotebookId = null;
                        renderNotebookList();
                        renderNotesList();
                        
                        showToast('数据导入成功');
                    }
                } catch (err) {
                    showToast('导入失败：文件格式错误');
                }
            };
            reader.readAsText(file);
            
            event.target.value = '';
        }
        
        // ============================================
        // 工具函数
        // ============================================
        
        function saveData() {
            localStorage.setItem('worknote_notebooks', JSON.stringify(notebooks));
            localStorage.setItem('worknote_notes', JSON.stringify(notes));
        }
        
        function formatDateTime(isoString) {
            const date = new Date(isoString);
            const now = new Date();
            const diff = now - date;
            
            if (diff < 60000) return '刚刚';
            if (diff < 3600000) return `${Math.floor(diff / 60000)} 分钟前`;
            if (diff < 86400000 && now.getDate() === date.getDate()) {
                return `今天 ${pad(date.getHours())}:${pad(date.getMinutes())}`;
            }
            
            return `${date.getFullYear()}/${pad(date.getMonth() + 1)}/${pad(date.getDate())} ${pad(date.getHours())}:${pad(date.getMinutes())}`;
        }
        
        function formatDateFile(date) {
            return `${date.getFullYear()}${pad(date.getMonth() + 1)}${pad(date.getDate())}_${pad(date.getHours())}${pad(date.getMinutes())}`;
        }
        
        function pad(n) {
            return n < 10 ? '0' + n : n;
        }
        
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        function closeModal(id) {
            document.getElementById(id).classList.remove('active');
        }
        
        function showLoading(show) {
            document.getElementById('loadingOverlay').classList.toggle('active', show);
        }
        
        function showToast(message) {
            const existing = document.querySelector('.toast');
            if (existing) existing.remove();
            
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.textContent = message;
            document.body.appendChild(toast);
            
            setTimeout(() => toast.remove(), 3000);
        }
        
        // 简单的 Markdown 解析
        const marked = {
            parse: (text) => {
                if (!text) return '';
                return text
                    .replace(/^### (.*$)/gim, '<h3>$1</h3>')
                    .replace(/^## (.*$)/gim, '<h2>$1</h2>')
                    .replace(/^# (.*$)/gim, '<h1>$1</h1>')
                    .replace(/\*\*(.*)\*\*/gim, '<b>$1</b>')
                    .replace(/\*(.*)\*/gim, '<i>$1</i>')
                    .replace(/`([^`]+)`/gim, '<code>$1</code>')
                    .replace(/```([\s\S]*?)```/gim, '<pre><code>$1</code></pre>')
                    .replace(/!\[(.*?)\]\((.*?)\)/gim, '<img alt="$1" src="$2" style="max-width:100%;">')
                    .replace(/\[(.*?)\]\((.*?)\)/gim, '<a href="$2">$1</a>')
                    .replace(/\n/gim, '<br>');
            }
        };
        
        // 点击外部关闭弹窗
        document.querySelectorAll('.modal').forEach(modal => {
            modal.addEventListener('click', (e) => {
                if (e.target === modal) closeModal(modal.id);
            });
        });
    </script>
</body>
