<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>工作笔记 | WorkNote</title>
    <link rel="manifest" href="manifest-worknote.json">
    <meta name="theme-color" content="#4D6C78">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="工作笔记">
    <link rel="apple-touch-icon" href="worknote-icon-192.png">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Markdown 编辑器 -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/easymde@2.18.0/dist/easymde.min.css">
    <script src="https://cdn.jsdelivr.net/npm/easymde@2.18.0/dist/easymde.min.js"></script>
    <!-- PDF 导出 -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <!-- 代码高亮 -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/highlight.js@11.7.0/styles/github.min.css">
    <script src="https://cdn.jsdelivr.net/npm/highlight.js@11.7.0/lib/core.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary-dark: #4D6C78;
            --primary-light: #B7D0E8;
            --primary-mid: #72A6C5;
            
            --bg: #f8fafc;
            --surface: #ffffff;
            --text: #2c3e50;
            --text-secondary: #5a6c7d;
            --divider: #e2e8f0;
            --shadow: rgba(77, 108, 120, 0.08);
        }

        body {
            min-height: 100vh;
            background: var(--bg);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            color: var(--text);
            line-height: 1.6;
            -webkit-overflow-scrolling: touch;
        }

        header {
            background: linear-gradient(135deg, var(--primary-dark), #3d5a63);
            color: white;
            padding: 20px;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 2px 10px var(--shadow);
        }

        .header-content {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        header h1 {
            font-size: 1.5rem;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .header-actions {
            display: flex;
            gap: 10px;
        }

        .icon-btn {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border: none;
            background: rgba(183, 208, 232, 0.2);
            color: white;
            font-size: 1.2rem;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .icon-btn:hover {
            background: rgba(183, 208, 232, 0.35);
            transform: scale(1.1);
        }

        .app-container {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            min-height: calc(100vh - 80px);
        }

        .sidebar {
            width: 280px;
            background: var(--surface);
            border-right: 1px solid var(--divider);
            display: flex;
            flex-direction: column;
        }

        .sidebar-header {
            padding: 20px;
            border-bottom: 1px solid var(--divider);
        }

        .sidebar-title {
            font-size: 0.85rem;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 15px;
        }

        .new-notebook-btn {
            width: 100%;
            padding: 12px;
            border: 2px dashed var(--primary-light);
            border-radius: 8px;
            background: transparent;
            color: var(--primary-dark);
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .new-notebook-btn:hover {
            border-color: var(--primary-mid);
            background: rgba(183, 208, 232, 0.1);
        }

        .notebook-list {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
        }

        .notebook-item {
            padding: 15px;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s;
            margin-bottom: 5px;
            display: flex;
            align-items: center;
            gap: 12px;
            position: relative;
        }

        .notebook-item:hover {
            background: rgba(183, 208, 232, 0.15);
        }

        .notebook-item.active {
            background: var(--primary-dark);
            color: white;
        }

        .notebook-icon {
            width: 40px;
            height: 40px;
            border-radius: 10px;
            background: linear-gradient(135deg, var(--primary-light), var(--primary-mid));
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
        }

        .notebook-item.active .notebook-icon {
            background: rgba(183, 208, 232, 0.3);
        }

        .notebook-info {
            flex: 1;
            min-width: 0;
        }

        .notebook-name {
            font-weight: 500;
            margin-bottom: 3px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .notebook-count {
            font-size: 0.8rem;
            opacity: 0.7;
        }

        .delete-notebook-btn {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            border: none;
            background: transparent;
            cursor: pointer;
            opacity: 0;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.9rem;
        }

        .notebook-item:hover .delete-notebook-btn {
            opacity: 0.6;
        }

        .notebook-item:hover .delete-notebook-btn:hover {
            opacity: 1;
            background: rgba(255, 255, 255, 0.2);
        }

        .notebook-item.active .delete-notebook-btn:hover {
            background: rgba(255, 255, 255, 0.25);
        }

        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            min-width: 0;
        }

        .notes-header {
            padding: 20px;
            background: var(--surface);
            border-bottom: 1px solid var(--divider);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }

        .notes-title {
            font-size: 1.3rem;
            font-weight: 500;
            color: var(--primary-dark);
        }

        .notes-actions {
            display: flex;
            gap: 10px;
            align-items: center;
            flex-wrap: wrap;
        }

        .sort-btn {
            padding: 8px 16px;
            border-radius: 20px;
            border: 1px solid var(--divider);
            background: white;
            color: var(--text-secondary);
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.3s;
        }

        .sort-btn:hover {
            border-color: var(--primary-mid);
            color: var(--primary-dark);
        }

        .new-note-btn {
            padding: 10px 20px;
            border-radius: 20px;
            border: none;
            background: var(--primary-mid);
            color: white;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .new-note-btn:hover {
            background: var(--primary-dark);
            transform: translateY(-2px);
        }

        .new-note-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .notes-list {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
        }

        .note-item {
            background: var(--surface);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 15px;
            box-shadow: 0 2px 8px var(--shadow);
            cursor: pointer;
            transition: all 0.3s;
            border-left: 4px solid transparent;
        }

        .note-item:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 20px rgba(77, 108, 120, 0.12);
            border-left-color: var(--primary-mid);
        }

        .note-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 10px;
            gap: 10px;
        }

        .note-title {
            font-size: 1.1rem;
            font-weight: 500;
            color: var(--text);
            flex: 1;
            min-width: 0;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .note-actions-row {
            display: flex;
            align-items: center;
            gap: 10px;
            flex-shrink: 0;
        }

        .note-time {
            font-size: 0.8rem;
            color: var(--text-secondary);
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .delete-note-btn {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            border: none;
            background: transparent;
            cursor: pointer;
            opacity: 0;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.9rem;
        }

        .note-item:hover .delete-note-btn {
            opacity: 0.5;
        }

        .note-item:hover .delete-note-btn:hover {
            opacity: 1;
            background: #fee2e2;
        }

        .note-preview {
            color: var(--text-secondary);
            font-size: 0.95rem;
            line-height: 1.6;
        }

        .empty-state {
            text-align: center;
            padding: 80px 20px;
            color: var(--text-secondary);
        }

        .empty-icon {
            font-size: 4rem;
            margin-bottom: 20px;
            opacity: 0.5;
        }

        .editor-page {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: var(--bg);
            z-index: 200;
            flex-direction: column;
        }

        .editor-page.active {
            display: flex;
        }

        .editor-header {
            background: var(--surface);
            padding: 15px 20px;
            border-bottom: 1px solid var(--divider);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }

        .editor-title-input {
            flex: 1;
            margin: 0 20px;
            min-width: 200px;
        }

        .editor-title-input input {
            width: 100%;
            padding: 12px 20px;
            border: 1px solid var(--divider);
            border-radius: 8px;
            font-size: 1.1rem;
            font-family: inherit;
            color: var(--text);
        }

        .editor-title-input input:focus {
            outline: none;
            border-color: var(--primary-mid);
        }

        .editor-actions {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .editor-btn {
            padding: 10px 18px;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            font-size: 0.85rem;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 6px;
            white-space: nowrap;
        }

        .editor-btn.save {
            background: var(--primary-mid);
            color: white;
        }

        .editor-btn.save:hover {
            background: var(--primary-dark);
        }

        .editor-btn.secondary {
            background: var(--bg);
            color: var(--text-secondary);
            border: 1px solid var(--divider);
        }

        .editor-btn.secondary:hover {
            background: var(--primary-light);
            color: var(--primary-dark);
            border-color: var(--primary-mid);
        }

        .editor-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .editor-container {
            flex: 1;
            display: flex;
            overflow: hidden;
        }

        .editor-pane {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        /* EasyMDE 样式优化 */
        .EasyMDEContainer {
            display: flex;
            flex-direction: column;
            height: 100%;
        }

        .EasyMDEContainer .CodeMirror {
            flex: 1;
            height: auto !important;
            font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace;
            font-size: 15px;
            background: var(--surface);
        }

        .editor-toolbar {
            border-color: var(--divider) !important;
            background: var(--surface) !important;
            padding: 10px !important;
        }

        .editor-toolbar button {
            color: var(--text-secondary) !important;
            border-radius: 6px !important;
            margin: 0 2px !important;
        }

        .editor-toolbar button:hover {
            background: var(--primary-light) !important;
            color: var(--primary-dark) !important;
        }

        .editor-toolbar button.active {
            background: var(--primary-light) !important;
            color: var(--primary-dark) !important;
        }

        /* 预览模式样式 */
        .editor-toolbar.preview-active {
            background: rgba(114, 166, 197, 0.15) !important;
        }

        .EasyMDEContainer .editor-preview {
            background: var(--surface) !important;
            padding: 30px !important;
        }

        .EasyMDEContainer .editor-preview .editor-preview-content {
            max-width: 800px;
            margin: 0 auto;
        }

        .EasyMDEContainer .editor-preview h1 {
            color: var(--primary-dark);
            border-bottom: 2px solid var(--primary-mid);
            padding-bottom: 10px;
            margin-bottom: 20px;
        }

        .EasyMDEContainer .editor-preview h2 {
            color: var(--primary-mid);
            margin-top: 30px;
        }

        .EasyMDEContainer .editor-preview h3 {
            color: var(--primary-dark);
        }

        .EasyMDEContainer .editor-preview code {
            background: var(--primary-light);
            color: var(--primary-dark);
            padding: 2px 6px;
            border-radius: 4px;
            font-family: 'SF Mono', monospace;
        }

        .EasyMDEContainer .editor-preview pre {
            background: #f1f5f9;
            padding: 16px;
            border-radius: 8px;
            overflow-x: auto;
        }

        .EasyMDEContainer .editor-preview pre code {
            background: none;
            padding: 0;
            color: var(--text);
        }

        .EasyMDEContainer .editor-preview blockquote {
            border-left: 4px solid var(--primary-mid);
            padding-left: 16px;
            margin: 16px 0;
            color: var(--text-secondary);
            background: rgba(183, 208, 232, 0.2);
            padding: 12px 16px;
            border-radius: 0 8px 8px 0;
        }

        .EasyMDEContainer .editor-preview img {
            max-width: 100%;
            border-radius: 8px;
            margin: 10px 0;
        }

        .EasyMDEContainer .editor-preview a {
            color: var(--primary-mid);
            text-decoration: none;
        }

        .EasyMDEContainer .editor-preview a:hover {
            text-decoration: underline;
        }

        .EasyMDEContainer .editor-preview ul,
        .EasyMDEContainer .editor-preview ol {
            padding-left: 24px;
            margin: 12px 0;
        }

        .EasyMDEContainer .editor-preview li {
            margin-bottom: 6px;
        }

        /* 分屏模式 */
        .EasyMDEContainer .editor-preview-side {
            background: var(--surface) !important;
            padding: 20px !important;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(77, 108, 120, 0.5);
            justify-content: center;
            align-items: center;
            z-index: 300;
            padding: 20px;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: var(--surface);
            padding: 30px;
            border-radius: 16px;
            width: 100%;
            max-width: 450px;
            box-shadow: 0 20px 50px rgba(77, 108, 120, 0.2);
        }

        .modal-title {
            font-size: 1.3rem;
            margin-bottom: 20px;
            color: var(--text);
        }

        .form-input {
            width: 100%;
            padding: 14px;
            border: 1px solid var(--divider);
            border-radius: 10px;
            font-size: 1rem;
            margin-bottom: 20px;
            font-family: inherit;
            color: var(--text);
        }

        .form-input:focus {
            outline: none;
            border-color: var(--primary-mid);
        }

        .modal-actions {
            display: flex;
            gap: 10px;
        }

        .modal-btn {
            flex: 1;
            padding: 12px;
            border-radius: 10px;
            border: none;
            cursor: pointer;
            font-size: 0.95rem;
            transition: all 0.3s;
        }

        .modal-btn.primary {
            background: var(--primary-mid);
            color: white;
        }

        .modal-btn.primary:hover {
            background: var(--primary-dark);
        }

        .modal-btn.secondary {
            background: var(--bg);
            color: var(--text-secondary);
        }

        .modal-btn.secondary:hover {
            background: var(--primary-light);
            color: var(--primary-dark);
        }

        .settings-panel {
            display: none;
            position: fixed;
            top: 0;
            right: 0;
            width: 400px;
            max-width: 90%;
            height: 100%;
            background: var(--surface);
            box-shadow: -5px 0 30px var(--shadow);
            z-index: 250;
            flex-direction: column;
        }

        .settings-panel.active {
            display: flex;
        }

        .settings-header {
            padding: 20px;
            border-bottom: 1px solid var(--divider);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .settings-content {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
        }

        .settings-section {
            margin-bottom: 30px;
        }

        .settings-section-title {
            font-size: 0.85rem;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 15px;
        }

        .loading-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(248, 250, 252, 0.95);
            justify-content: center;
            align-items: center;
            z-index: 400;
            flex-direction: column;
        }

        .loading-overlay.active {
            display: flex;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid var(--primary-light);
            border-top-color: var(--primary-mid);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--primary-dark);
            color: white;
            padding: 14px 28px;
            border-radius: 30px;
            font-size: 0.95rem;
            z-index: 500;
            animation: fadeInUp 0.3s ease;
            box-shadow: 0 4px 15px rgba(77, 108, 120, 0.3);
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateX(-50%) translateY(20px); }
            to { opacity: 1; transform: translateX(-50%) translateY(0); }
        }

        .export-preview-container {
            position: fixed;
            left: -9999px;
            top: 0;
            width: 210mm;
            min-height: 297mm;
            padding: 20mm;
            background: white;
            font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
            line-height: 1.8;
            color: #2c3e50;
        }

        .export-cover {
            text-align: center;
            padding: 200px 0;
            page-break-after: always;
        }

        .export-cover h1 {
            font-size: 48px;
            color: var(--primary-dark);
            margin-bottom: 40px;
            font-weight: 400;
        }

        .export-meta {
            color: #5a6c7d;
            font-size: 16px;
            margin-bottom: 15px;
        }

        .export-note {
            margin-bottom: 50px;
            padding-bottom: 30px;
            border-bottom: 1px solid #e2e8f0;
            page-break-inside: avoid;
        }

        .export-note-title {
            font-size: 24px;
            color: var(--primary-dark);
            margin-bottom: 10px;
            font-weight: 500;
        }

        .export-note-time {
            color: #72A6C5;
            font-size: 13px;
            margin-bottom: 20px;
        }

        @media (max-width: 768px) {
            .sidebar {
                position: fixed;
                left: -280px;
                height: 100%;
                z-index: 150;
                transition: left 0.3s;
                box-shadow: 2px 0 20px var(--shadow);
            }

            .sidebar.open {
                left: 0;
            }

            .editor-header {
                padding: 10px;
            }

            .editor-title-input {
                margin: 0 10px;
                order: 3;
                width: 100%;
            }

            .editor-actions {
                width: 100%;
                justify-content: flex-end;
            }

            .notes-header {
                flex-direction: column;
                align-items: flex-start;
            }

            .notes-actions {
                width: 100%;
                justify-content: flex-end;
            }
        }
    </style>
</head>
<body>
    <header>
        <div class="header-content">
            <h1>📓 工作笔记</h1>
            <div class="header-actions">
                <button class="icon-btn" onclick="openSettings()" title="设置">⚙️</button>
                <button class="icon-btn" onclick="syncToGithub()" title="同步到GitHub">☁️</button>
            </div>
        </div>
    </header>

    <div class="app-container">
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <div class="sidebar-title">笔记本</div>
                <button class="new-notebook-btn" onclick="openNewNotebookModal()">
                    <span>+</span>
                    <span>新建笔记本</span>
                </button>
            </div>
            <div class="notebook-list" id="notebookList"></div>
        </aside>

        <main class="main-content">
            <div class="notes-header">
                <div class="notes-title" id="currentNotebookName">请选择笔记本</div>
                <div class="notes-actions">
                    <button class="sort-btn" onclick="toggleSort()" id="sortBtn">📅 最近修改</button>
                    <button class="sort-btn" onclick="exportNotebookPDF()" id="exportNotebookBtn" disabled>📄 导出笔记本</button>
                    <button class="new-note-btn" onclick="createNewNote()" id="newNoteBtn" disabled>
                        <span>+</span>
                        <span>新建笔记</span>
                    </button>
                </div>
            </div>
            <div class="notes-list" id="notesList">
                <div class="empty-state">
                    <div class="empty-icon">📓</div>
                    <p>选择或创建一个笔记本开始</p>
                </div>
            </div>
        </main>
    </div>

    <div class="editor-page" id="editorPage">

    <script>
        let notebooks = JSON.parse(localStorage.getItem('worknote_notebooks')) || [];
        let notes = JSON.parse(localStorage.getItem('worknote_notes')) || [];
        
        let currentNotebookId = null;
        let currentNoteId = null;
        let sortBy = 'updated';
        let easyMDE = null;
        let isPreviewMode = false;
        
        let githubConfig = {
            token: localStorage.getItem('worknote_github_token') || '',
            repo: localStorage.getItem('worknote_github_repo') || '',
            branch: localStorage.getItem('worknote_github_branch') || 'main'
        };
        
        let imageConfig = {
            token: localStorage.getItem('worknote_image_token') || '',
            repo: localStorage.getItem('worknote_image_repo') || '',
            branch: localStorage.getItem('worknote_image_branch') || 'main'
        };

        // 改进的 Markdown 解析器
        const marked = {
            parse: (text) => {
                if (!text) return '';
                
                let html = text;
                
                const escapeHtml = (str) => {
                    return str
                        .replace(/&/g, '&amp;')
                        .replace(/</g, '&lt;')
                        .replace(/>/g, '&gt;');
                };
                
                // 保护代码块
                const codeBlocks = [];
                html = html.replace(/```(\w*)\n([\s\S]*?)```/gm, (match, lang, code) => {
                    const id = codeBlocks.length;
                    const langClass = lang ? ` class="language-${lang}"` : '';
                    codeBlocks.push(`<pre><code${langClass}>${escapeHtml(code.trim())}</code></pre>`);
                    return `<!--CODE_BLOCK_${id}-->`;
                });
                
                // 保护行内代码
                const inlineCodes = [];
                html = html.replace(/`([^`]+)`/g, (match, code) => {
                    const id = inlineCodes.length;
                    inlineCodes.push(`<code>${escapeHtml(code)}</code>`);
                    return `<!--INLINE_CODE_${id}-->`;
                });
                
                // 处理标题
                html = html.replace(/^###### (.*)$/gm, '<h6>$1</h6>');
                html = html.replace(/^##### (.*)$/gm, '<h5>$1</h5>');
                html = html.replace(/^#### (.*)$/gm, '<h4>$1</h4>');
                html = html.replace(/^### (.*)$/gm, '<h3>$1</h3>');
                html = html.replace(/^## (.*)$/gm, '<h2>$1</h2>');
                html = html.replace(/^# (.*)$/gm, '<h1>$1</h1>');
                
                // 处理粗体和斜体
                html = html.replace(/\*\*\*(.*?)\*\*\*/g, '<strong><em>$1</em></strong>');
                html = html.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
                html = html.replace(/\*(.*?)\*/g, '<em>$1</em>');
                html = html.replace(/___(.*?)___/g, '<em>$1</em>');
                html = html.replace(/__(.*?)__/g, '<strong>$1</strong>');
                html = html.replace(/_(.*?)_/g, '<em>$1</em>');
                
                // 处理图片
                html = html.replace(/!\[(.*?)\]\((.*?)\)/g, '<img alt="$1" src="$2" style="max-width:100%;border-radius:8px;margin:10px 0;">');
                
                // 处理链接
                html = html.replace(/\[(.*?)\]\((.*?)\)/g, '<a href="$2" target="_blank" style="color:#72A6C5;text-decoration:none;">$1</a>');
                
                // 处理引用
                html = html.replace(/^> (.*)$/gm, '<blockquote>$1</blockquote>');
                html = html.replace(/<\/blockquote>\n<blockquote>/g, '<br>');
                
                // 处理无序列表
                const lines = html.split('\n');
                const result = [];
                let inUl = false;
                let inOl = false;
                
                for (let i = 0; i < lines.length; i++) {
                    const line = lines[i];
                    const ulMatch = line.match(/^[-*+] (.*)$/);
                    const olMatch = line.match(/^\d+\. (.*)$/);
                    
                    if (ulMatch) {
                        if (!inUl) {
                            if (inOl) {
                                result.push('</ol>');
                                inOl = false;
                            }
                            result.push('<ul>');
                            inUl = true;
                        }
                        result.push(`<li>${ulMatch[1]}</li>`);
                    } else if (olMatch) {
                        if (!inOl) {
                            if (inUl) {
                                result.push('</ul>');
                                inUl = false;
                            }
                            result.push('<ol>');
                            inOl = true;
                        }
                        result.push(`<li>${olMatch[1]}</li>`);
                    } else {
                        if (inUl) {
                            result.push('</ul>');
                            inUl = false;
                        }
                        if (inOl) {
                            result.push('</ol>');
                            inOl = false;
                        }
                        result.push(line);
                    }
                }
                
                if (inUl) result.push('</ul>');
                if (inOl) result.push('</ol>');
                html = result.join('\n');
                
                // 处理分隔线
                html = html.replace(/^---+$/gm, '<hr>');
                
                // 处理段落
                const blocks = html.split(/\n\n+/);
                html = blocks.map(block => {
                    block = block.trim();
                    if (!block) return '';
                    
                    if (block.startsWith('<h') || 
                        block.startsWith('<ul') || 
                        block.startsWith('<ol') || 
                        block.startsWith('<blockquote') || 
                        block.startsWith('<pre') || 
                        block.startsWith('<hr') ||
                        block.startsWith('<!--CODE_BLOCK_') ||
                        block.startsWith('<!--INLINE_CODE_')) {
                        return block;
                    }
                    
                    return `<p>${block}</p>`;
                }).join('\n');
                
                // 恢复代码块
                html = html.replace(/<!--CODE_BLOCK_(\d+)-->/g, (match, id) => codeBlocks[parseInt(id)]);
                html = html.replace(/<!--INLINE_CODE_(\d+)-->/g, (match, id) => inlineCodes[parseInt(id)]);
                
                // 处理单个换行
                html = html.replace(/\n/g, ' ');
                
                return html;
            }
        };

        document.addEventListener('DOMContentLoaded', () => {
            renderNotebookList();
            loadGithubSettings();
        });

        function openNewNotebookModal() {
            document.getElementById('notebookNameInput').value = '';
            document.getElementById('newNotebookModal').classList.add('active');
            setTimeout(() => document.getElementById('notebookNameInput').focus(), 100);
        }

        function createNotebook() {
            const name = document.getElementById('notebookNameInput').value.trim();
            if (!name) {
                showToast('请输入笔记本名称');
                return;
            }
            
            const notebook = {
                id: Date.now().toString(),
                name: name,
                createdAt: new Date().toISOString(),
                updatedAt: new Date().toISOString()
            };
            
            notebooks.push(notebook);
            saveData();
            
            closeModal('newNotebookModal');
            renderNotebookList();
            selectNotebook(notebook.id);
            showToast('笔记本创建成功');
        }

        function deleteNotebook(id) {
            const notebook = notebooks.find(n => n.id === id);
            const noteCount = notes.filter(n => n.notebookId === id).length;
            
            if (!confirm(`确定删除笔记本"${notebook.name}"？\n其中包含 ${noteCount} 篇笔记，此操作不可恢复！`)) {
                return;
            }
            
            notebooks = notebooks.filter(n => n.id !== id);
            notes = notes.filter(n => n.notebookId !== id);
            
            if (currentNotebookId === id) {
                currentNotebookId = null;
                document.getElementById('currentNotebookName').textContent = '请选择笔记本';
                document.getElementById('newNoteBtn').disabled = true;
                document.getElementById('exportNotebookBtn').disabled = true;
                renderNotesList();
            }
            
            saveData();
            renderNotebookList();
            showToast('笔记本已删除');
        }

        function renderNotebookList() {
            const container = document.getElementById('notebookList');
            
            if (notebooks.length === 0) {
                container.innerHTML = '<div style="padding: 40px; text-align: center; color: var(--text-secondary);">还没有笔记本</div>';
                return;
            }
            
            container.innerHTML = notebooks.map(nb => {
                const noteCount = notes.filter(n => n.notebookId === nb.id).length;
                const isActive = nb.id === currentNotebookId;
                
                return `
                    <div class="notebook-item ${isActive ? 'active' : ''}" onclick="selectNotebook('${nb.id}')">
                        <div class="notebook-icon">📓</div>
                        <div class="notebook-info">
                            <div class="notebook-name">${escapeHtml(nb.name)}</div>
                            <div class="notebook-count">${noteCount} 篇笔记</div>
                        </div>
                        <button class="delete-notebook-btn" onclick="event.stopPropagation(); deleteNotebook('${nb.id}')" title="删除笔记本">
                            🗑️
                        </button>
                    </div>
                `;
            }).join('');
        }

        function selectNotebook(id) {
            currentNotebookId = id;
            const notebook = notebooks.find(n => n.id === id);
            
            document.getElementById('currentNotebookName').textContent = notebook ? notebook.name : '请选择笔记本';
            document.getElementById('newNoteBtn').disabled = !notebook;
            document.getElementById('exportNotebookBtn').disabled = !notebook;
            
            renderNotebookList();
            renderNotesList();
        }

        function createNewNote() {
            if (!currentNotebookId) return;
            
            currentNoteId = null;
            document.getElementById('noteTitleInput').value = '';
            
            initEditor('');
            
            document.getElementById('editorPage').classList.add('active');
        }

        function editNote(id) {
            const note = notes.find(n => n.id === id);
            if (!note) return;
            
            currentNoteId = id;
            document.getElementById('noteTitleInput').value = note.title || '';
            
            initEditor(note.content || '');
            
            document.getElementById('editorPage').classList.add('active');
        }

        function deleteNote(id) {
            if (!confirm('确定删除这篇笔记？此操作不可恢复！')) {
                return;
            }
            
            notes = notes.filter(n => n.id !== id);
            
            if (currentNoteId === id) {
                closeEditor();
            }
            
            saveData();
            renderNotesList();
            renderNotebookList();
            showToast('笔记已删除');
        }

        function initEditor(content) {
            if (easyMDE) {
                easyMDE.toTextArea();
                easyMDE = null;
            }
            
            const textarea = document.getElementById('markdownEditor');
            textarea.value = content;
            
            isPreviewMode = false;
            
            easyMDE = new EasyMDE({
                element: textarea,
                spellChecker: false,
                autosave: { enabled: false },
                placeholder: '开始写作... 支持 Markdown 语法\n\n# 标题\n**粗体** *斜体* `代码`\n- 列表项\n> 引用\n\n点击 👁️ 切换预览模式',
                toolbar: [
                    {
                        name: "bold",
                        action: EasyMDE.toggleBold,
                        className: "fa fa-bold",
                        title: "粗体",
                    },
                    {
                        name: "italic",
                        action: EasyMDE.toggleItalic,
                        className: "fa fa-italic",
                        title: "斜体",
                    },
                    {
                        name: "heading",
                        action: EasyMDE.toggleHeadingSmaller,
                        className: "fa fa-heading",
                        title: "标题",
                    },
                    "|",
                    {
                        name: "quote",
                        action: EasyMDE.toggleBlockquote,
                        className: "fa fa-quote-left",
                        title: "引用",
                    },
                    {
                        name: "unordered-list",
                        action: EasyMDE.toggleUnorderedList,
                        className: "fa fa-list-ul",
                        title: "无序列表",
                    },
                    {
                        name: "ordered-list",
                        action: EasyMDE.toggleOrderedList,
                        className: "fa fa-list-ol",
                        title: "有序列表",
                    },
                    "|",
                    {
                        name: "link",
                        action: EasyMDE.drawLink,
                        className: "fa fa-link",
                        title: "链接",
                    },
                    {
                        name: "image",
                        action: EasyMDE.drawImage,
                        className: "fa fa-image",
                        title: "图片",
                    },
                    {
                        name: "code",
                        action: EasyMDE.toggleCodeBlock,
                        className: "fa fa-code",
                        title: "代码",
                    },
                    {
                        name: "table",
                        action: EasyMDE.drawTable,
                        className: "fa fa-table",
                        title: "表格",
                    },
                    "|",
                    {
                        name: "preview",
                        action: togglePreviewMode,
                        className: "fa fa-eye",
                        title: "切换预览模式",
                    },
                    {
                        name: "side-by-side",
                        action: EasyMDE.toggleSideBySide,
                        className: "fa fa-columns",
                        title: "分屏预览",
                    },
                    {
                        name: "fullscreen",
                        action: EasyMDE.toggleFullScreen,
                        className: "fa fa-expand",
                        title: "全屏",
                    },
                    "|",
                    {
                        name: "guide",
                        action: "https://www.markdownguide.org/basic-syntax/",
                        className: "fa fa-question-circle",
                        title: "Markdown 语法指南",
                    }
                ],
                status: false,
                minHeight: 'calc(100vh - 200px)',
                renderingConfig: {
                    singleLineBreaks: false,
                    codeSyntaxHighlighting: true,
                },
                previewRender: function(plainText) {
                    return marked.parse(plainText);
                }
            });
            
            updateImageButtonState();
        }

        function togglePreviewMode() {
            if (!easyMDE) return;
            
            easyMDE.togglePreview();
            isPreviewMode = !isPreviewMode;
            
            const toolbar = document.querySelector('.editor-toolbar');
            const previewBtn = document.querySelector('.editor-toolbar .fa-eye');
            
            if (isPreviewMode) {
                toolbar.classList.add('preview-active');
                if (previewBtn) {
                    previewBtn.parentElement.classList.add('active');
                }
            } else {
                toolbar.classList.remove('preview-active');
                if (previewBtn) {
                    previewBtn.parentElement.classList.remove('active');
                }
            }
        }

        function saveNote() {
            const title = document.getElementById('noteTitleInput').value.trim() || '无标题';
            const content = easyMDE.value();
            const now = new Date().toISOString();
            
            if (currentNoteId) {
                const index = notes.findIndex(n => n.id === currentNoteId);
                notes[index] = {
                    ...notes[index],
                    title,
                    content,
                    updatedAt: now
                };
                
                const note = notes.splice(index, 1)[0];
                notes.unshift(note);
            } else {
                const note = {
                    id: Date.now().toString(),
                    notebookId: currentNotebookId,
                    title,
                    content,
                    createdAt: now,
                    updatedAt: now
                };
                notes.unshift(note);
                currentNoteId = note.id;
            }
            
            saveData();
            showToast('保存成功');
        }

        function closeEditor() {
            document.getElementById('editorPage').classList.remove('active');
            renderNotesList();
            
            if (easyMDE) {
                easyMDE.toTextArea();
                easyMDE = null;
            }
        }

        function toggleSort() {
            sortBy = sortBy === 'updated' ? 'created' : 'updated';
            document.getElementById('sortBtn').textContent = sortBy === 'updated' ? '📅 最近修改' : '📅 创建时间';
            renderNotesList();
        }

        function renderNotesList() {
            const container = document.getElementById('notesList');
            
            if (!currentNotebookId) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-icon">📓</div>
                        <p>选择或创建一个笔记本开始</p>
                    </div>
                `;
                return;
            }
            
            let notebookNotes = notes.filter(n => n.notebookId === currentNotebookId);
            
            if (sortBy === 'created') {
                notebookNotes.sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt));
            }
            
            if (notebookNotes.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-icon">📝</div>
                        <p>还没有笔记，点击右上角新建</p>
                    </div>
                `;
                return;
            }
            
            container.innerHTML = notebookNotes.map(note => {
                const updated = formatDateTime(note.updatedAt);
                const plainText = marked.parse(note.content || '')
                    .replace(/<[^>]+>/g, ' ')
                    .replace(/\s+/g, ' ')
                    .trim()
                    .substring(0, 150);
                const preview = plainText || '无内容';
                
                return `
                    <div class="note-item" onclick="editNote('${note.id}')">
                        <div class="note-header">
                            <div class="note-title">${escapeHtml(note.title)}</div>
                            <div class="note-actions-row">
                                <div class="note-time">
                                    <span>🕐</span>
                                    <span>${updated}</span>
                                </div>
                                <button class="delete-note-btn" onclick="event.stopPropagation(); deleteNote('${note.id}')" title="删除笔记">
                                    🗑️
                                </button>
                            </div>
                        </div>
                        <div class="note-preview">${escapeHtml(preview)}...</div>
                    </div>
                `;
            }).join('');
        }

        function configureImageUpload() {
            const token = prompt('GitHub Token (ghp_...):', imageConfig.token);
            if (token === null) return;
            
            const repo = prompt('图片仓库 (用户名/仓库名):', imageConfig.repo);
            if (repo === null) return;
            
            const branch = prompt('分支 (默认 main):', imageConfig.branch) || 'main';
            
            imageConfig.token = token.trim();
            imageConfig.repo = repo.trim();
            imageConfig.branch = branch.trim();
            
            localStorage.setItem('worknote_image_token', imageConfig.token);
            localStorage.setItem('worknote_image_repo', imageConfig.repo);
            localStorage.setItem('worknote_image_branch', imageConfig.branch);
            
            updateImageButtonState();
            showToast('图床配置已保存');
        }

        function updateImageButtonState() {
            const btn = document.getElementById('insertImageBtn');
            const hasConfig = imageConfig.token && imageConfig.repo;
            btn.disabled = !hasConfig;
            btn.textContent = hasConfig ? '🖼️ 插入图片' : '🖼️ 请先配置';
        }

        async function insertImage() {
            if (!imageConfig.token || !imageConfig.repo) {
                configureImageUpload();
                return;
            }
            
            const input = document.createElement('input');
            input.type = 'file';
            input.accept = 'image/*';
            input.multiple = true;
            
            input.onchange = async (e) => {
                const files = Array.from(e.target.files);
                if (files.length === 0) return;
                
                showToast(`正在上传 ${files.length} 张图片...`);
                
                for (const file of files) {
                    try {
                        const url = await uploadImageToGithub(file);
                        const cm = easyMDE.codemirror;
                        const cursor = cm.getCursor();
                        const imageMarkdown = `\n![${file.name}](${url})\n`;
                        cm.replaceRange(imageMarkdown, cursor);
                        showToast('图片已插入');
                    } catch (err) {
                        showToast('上传失败: ' + err.message);
                    }
                }
            };
            
            input.click();
        }

        async function uploadImageToGithub(file) {
            const compressed = await compressImage(file, 1600, 0.85);
            const base64Data = compressed.split(',')[1];
            
            const now = new Date();
            const dateStr = `${now.getFullYear()}${pad(now.getMonth()+1)}${pad(now.getDate())}`;
            const random = Math.random().toString(36).substring(2, 10);
            const ext = file.name.split('.').pop() || 'jpg';
            const filename = `images/${dateStr}_${random}.${ext}`;
            
            const response = await fetch(`https://api.github.com/repos/${imageConfig.repo}/contents/${filename}`, {
                method: 'PUT',
                headers: {
                    'Authorization': `token ${imageConfig.token}`,
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    message: `Add image: ${file.name}`,
                    content: base64Data,
                    branch: imageConfig.branch
                })
            });
            
            if (!response.ok) {
                const error = await response.json();
                throw new Error(error.message || 'Upload failed');
            }
            
            return `https://cdn.jsdelivr.net/gh/${imageConfig.repo}@${imageConfig.branch}/${filename}`;
        }

        function compressImage(file, maxWidth = 1600, quality = 0.85) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = (e) => {
                    const img = new Image();
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        let width = img.width;
                        let height = img.height;
                        
                        if (width > maxWidth) {
                            height = (maxWidth / width) * height;
                            width = maxWidth;
                        }
                        
                        canvas.width = Math.floor(width);
                        canvas.height = Math.floor(height);
                        
                        const ctx = canvas.getContext('2d');
                        ctx.fillStyle = '#ffffff';
                        ctx.fillRect(0, 0, canvas.width, canvas.height);
                        ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                        
                        resolve(canvas.toDataURL('image/jpeg', quality));
                    };
                    img.onerror = reject;
                    img.src = e.target.result;
                };
                reader.onerror = reject;
                reader.readAsDataURL(file);
            });
        }

        async function exportNotePDF() {
            const title = document.getElementById('noteTitleInput').value.trim() || '无标题';
            const content = easyMDE.value();
            const now = new Date();
            
            const container = document.createElement('div');
            container.className = 'export-preview-container';
            container.innerHTML = `
                <div class="markdown-body">
                    <h1>${escapeHtml(title)}</h1>
                    <div class="export-note-time">导出时间：${formatDateTime(now.toISOString())}</div>
                    ${marked.parse(content)}
                </div>
            `;
            document.body.appendChild(container);
            
            container.querySelectorAll('pre code').forEach((block) => {
                hljs.highlightElement(block);
            });
            
            const { jsPDF } = window.jspdf;
            const pdf = new jsPDF('p', 'mm', 'a4');
            
            const canvas = await html2canvas(container, {
                scale: 2,
                useCORS: true,
                backgroundColor: '#ffffff'
            });
            
            const imgData = canvas.toDataURL('image/png');
            const imgWidth = 210 - 20 * 2;
            const imgHeight = (canvas.height * imgWidth) / canvas.width;
            
            let heightLeft = imgHeight;
            let position = 0;
            
            pdf.addImage(imgData, 'PNG', 20, 20, imgWidth, imgHeight);
            heightLeft -= 297 - 40;
            
            while (heightLeft > 0) {
                position = heightLeft - imgHeight + 20;
                pdf.addPage();
                pdf.addImage(imgData, 'PNG', 20, position, imgWidth, imgHeight);
                heightLeft -= 297 - 40;
            }
            
            pdf.save(`${title}_${formatDateFile(now)}.pdf`);
            
            document.body.removeChild(container);
            showToast('PDF 导出成功');
        }

        async function exportNotebookPDF() {
            if (!currentNotebookId) return;
            
            const notebook = notebooks.find(n => n.id === currentNotebookId);
            const notebookNotes = notes.filter(n => n.notebookId === currentNotebookId)
                .sort((a, b) => new Date(b.updatedAt) - new Date(a.updatedAt));
            
            if (notebookNotes.length === 0) {
                showToast('笔记本为空');
                return;
            }
            
            showLoading(true);
            
            const container = document.createElement('div');
            container.className = 'export-preview-container';
            
            let html = `
                <div class="export-cover">
                    <h1>${escapeHtml(notebook.name)}</h1>
                    <div class="export-meta">共 ${notebookNotes.length} 篇笔记</div>
                    <div class="export-meta">导出时间：${formatDateTime(new Date().toISOString())}</div>
                </div>
            `;
            
            for (const note of notebookNotes) {
                html += `
                    <div class="export-note">
                        <div class="export-note-title">${escapeHtml(note.title)}</div>
                        <div class="export-note-time">最后修改：${formatDateTime(note.updatedAt)}</div>
                        <div class="markdown-body">${marked.parse(note.content || '')}</div>
                    </div>
                `;
            }
            
            container.innerHTML = html;
            document.body.appendChild(container);
            
            container.querySelectorAll('pre code').forEach(block => {
                hljs.highlightElement(block);
            });
            
            const { jsPDF } = window.jspdf;
            const pdf = new jsPDF('p', 'mm', 'a4');
            
            const canvas = await html2canvas(container, {
                scale: 2,
                useCORS: true,
                backgroundColor: '#ffffff',
                windowWidth: 794
            });
            
            const imgData = canvas.toDataURL('image/png');
            const imgWidth = 210 - 20 * 2;
            const imgHeight = (canvas.height * imgWidth) / canvas.width;
            
            let heightLeft = imgHeight;
            let position = 0;
            
            pdf.addImage(imgData, 'PNG', 20, 20, imgWidth, imgHeight);
            heightLeft -= 297 - 40;
            
            while (heightLeft > 0) {
                position = heightLeft - imgHeight + 20;
                pdf.addPage();
                pdf.addImage(imgData, 'PNG', 20, position, imgWidth, imgHeight);
                heightLeft -= 297 - 40;
            }
            
            pdf.save(`${notebook.name}_${formatDateFile(new Date())}.pdf`);
            
            document.body.removeChild(container);
            showLoading(false);
            showToast('笔记本导出成功');
        }

        function openSettings() {
            document.getElementById('settingsPanel').classList.add('active');
        }

        function closeSettings() {
            document.getElementById('settingsPanel').classList.remove('active');
        }

        function loadGithubSettings() {
            document.getElementById('githubToken').value = githubConfig.token;
            document.getElementById('githubRepo').value = githubConfig.repo;
            document.getElementById('githubBranch').value = githubConfig.branch;
        }

        function saveGithubSettings() {
            githubConfig.token = document.getElementById('githubToken').value.trim();
            githubConfig.repo = document.getElementById('githubRepo').value.trim();
            githubConfig.branch = document.getElementById('githubBranch').value.trim() || 'main';
            
            localStorage.setItem('worknote_github_token', githubConfig.token);
            localStorage.setItem('worknote_github_repo', githubConfig.repo);
            localStorage.setItem('worknote_github_branch', githubConfig.branch);
            
            testGithubConnection();
        }

        async function testGithubConnection() {
            if (!githubConfig.token || !githubConfig.repo) {
                showToast('请填写完整的 GitHub 配置');
                return;
            }
            
            showLoading(true);
            
            try {
                const response = await fetch(`https://api.github.com/repos/${githubConfig.repo}`, {
                    headers: {
                        'Authorization': `token ${githubConfig.token}`,
                        'Accept': 'application/vnd.github.v3+json'
                    }
                });
                
                if (!response.ok) throw new Error('连接失败');
                
                showToast('✅ GitHub 连接成功');
                closeSettings();
                
            } catch (err) {
                showToast('❌ 连接失败：' + err.message);
            } finally {
                showLoading(false);
            }
        }

        async function syncToGithub() {
            if (!githubConfig.token || !githubConfig.repo) {
                showToast('请先配置 GitHub');
                openSettings();
                return;
            }
            
            showLoading(true);
            
            try {
                const readRes = await fetch(`https://api.github.com/repos/${githubConfig.repo}/contents/worknote-data.json`, {
                    headers: { 'Authorization': `token ${githubConfig.token}` }
                });
                
                let sha = null;
                if (readRes.ok) {
                    const data = await readRes.json();
                    sha = data.sha;
                }
                
                const saveData = {
                    notebooks,
                    notes,
                    syncedAt: new Date().toISOString()
                };
                
                const content = btoa(unescape(encodeURIComponent(JSON.stringify(saveData, null, 2))));
                
                const body = {
                    message: `Sync worknote data: ${new Date().toLocaleString()}`,
                    content: content,
                    branch: githubConfig.branch
                };
                
                if (sha) body.sha = sha;
                
                const saveRes = await fetch(`https://api.github.com/repos/${githubConfig.repo}/contents/worknote-data.json`, {
                    method: 'PUT',
                    headers: {
                        'Authorization': `token ${githubConfig.token}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(body)
                });
                
                if (!saveRes.ok) throw new Error('保存失败');
                
                showToast('✅ 同步成功');
                
            } catch (err) {
                console.error(err);
                showToast('❌ 同步失败：' + err.message);
            } finally {
                showLoading(false);
            }
        }

        function exportAllData() {
            const data = {
                notebooks,
                notes,
                exportedAt: new Date().toISOString()
            };
            
            const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `worknote-backup-${formatDateFile(new Date())}.json`;
            a.click();
            URL.revokeObjectURL(url);
            
            showToast('数据已导出');
        }

        function importData() {
            document.getElementById('importFile').click();
        }

        function handleImport(event) {
            const file = event.target.files[0];
            if (!file) return;
            
            const reader = new FileReader();
            reader.onload = (e) => {
                try {
                    const data = JSON.parse(e.target.result);
                    
                    if (confirm(`确定导入？这将覆盖现有 ${notebooks.length} 个笔记本和 ${notes.length} 篇笔记`)) {
                        notebooks = data.notebooks || [];
                        notes = data.notes || [];
                        saveData();
                        
                        currentNotebookId = null;
                        renderNotebookList();
                        renderNotesList();
                        
                        showToast('数据导入成功');
                    }
                } catch (err) {
                    showToast('导入失败：文件格式错误');
                }
            };
            reader.readAsText(file);
            
            event.target.value = '';
        }

        function saveData() {
            localStorage.setItem('worknote_notebooks', JSON.stringify(notebooks));
            localStorage.setItem('worknote_notes', JSON.stringify(notes));
        }

        function formatDateTime(isoString) {
            const date = new Date(isoString);
            const now = new Date();
            const diff = now - date;
            
            if (diff < 60000) return '刚刚';
            if (diff < 3600000) return `${Math.floor(diff / 60000)} 分钟前`;
            if (diff < 86400000 && now.getDate() === date.getDate()) {
                return `今天 ${pad(date.getHours())}:${pad(date.getMinutes())}`;
            }
            
            return `${date.getFullYear()}/${pad(date.getMonth() + 1)}/${pad(date.getDate())} ${pad(date.getHours())}:${pad(date.getMinutes())}`;
        }

        function formatDateFile(date) {
            return `${date.getFullYear()}${pad(date.getMonth() + 1)}${pad(date.getDate())}_${pad(date.getHours())}${pad(date.getMinutes())}`;
        }

        function pad(n) {
            return n < 10 ? '0' + n : n;
        }

        function escapeHtml(text) {
            if (typeof text !== 'string') return '';
            return text
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#039;');
        }

        function closeModal(id) {
            document.getElementById(id).classList.remove('active');
        }

        function showLoading(show) {
            document.getElementById('loadingOverlay').classList.toggle('active', show);
        }

        function showToast(message) {
            const existing = document.querySelector('.toast');
            if (existing) existing.remove();
            
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.textContent = message;
            document.body.appendChild(toast);
            
            setTimeout(() => toast.remove(), 3000);
        }

        document.querySelectorAll('.modal').forEach(modal => {
            modal.addEventListener('click', (e) => {
                if (e.target === modal) closeModal(modal.id);
            });
        });
    </script>
</body>
