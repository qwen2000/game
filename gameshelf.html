<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的游戏书架 | Game Shelf</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --cream: #fefcf8;
            --soft-pink: #fce4ec;
            --dusty-pink: #f8bbd9;
            --sage: #e8f5e9;
            --soft-green: #c8e6c9;
            --sky: #e3f2fd;
            --soft-blue: #bbdefb;
            --lavender: #f3e5f5;
            --peach: #ffecb3;
            --warm-gray: #8d6e63;
            --text: #4a4a4a;
            --text-light: #757575;
            --shadow: rgba(0,0,0,0.06);
        }

        body {
            min-height: 100vh;
            background: var(--cream);
            font-family: 'Hiragino Sans', 'Noto Sans JP', -apple-system, BlinkMacSystemFont, sans-serif;
            color: var(--text);
            line-height: 1.6;
        }

        /* 头部 */
        header {
            background: linear-gradient(180deg, var(--soft-pink) 0%, var(--cream) 100%);
            padding: 40px 20px 30px;
            text-align: center;
            position: relative;
        }

        header::before {
            content: '❀';
            position: absolute;
            top: 15px;
            left: 20px;
            color: var(--dusty-pink);
            font-size: 1.5rem;
            opacity: 0.6;
        }

        header::after {
            content: '❀';
            position: absolute;
            top: 20px;
            right: 25px;
            color: var(--soft-green);
            font-size: 1.2rem;
            opacity: 0.6;
        }

        header h1 {
            font-size: 2rem;
            font-weight: 400;
            color: var(--warm-gray);
            letter-spacing: 0.15em;
        }

        header h1 span {
            display: block;
            font-size: 0.9rem;
            color: var(--text-light);
            margin-top: 8px;
            letter-spacing: 0.1em;
        }

        /* 导航面包屑 */
        .breadcrumb {
            max-width: 1200px;
            margin: 0 auto;
            padding: 15px 20px;
            font-size: 0.85rem;
            color: var(--text-light);
        }

        .breadcrumb a {
            color: var(--dusty-pink);
            text-decoration: none;
            transition: color 0.3s;
        }

        .breadcrumb a:hover {
            color: var(--warm-gray);
        }

        /* 操作栏 */
        .action-bar {
            max-width: 1200px;
            margin: 0 auto 20px;
            padding: 0 20px;
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            align-items: center;
        }

        .header-btn {
            padding: 10px 22px;
            border-radius: 25px;
            border: none;
            background: white;
            color: var(--text);
            font-size: 0.9rem;
            cursor: pointer;
            box-shadow: 0 2px 8px var(--shadow);
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .header-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 15px var(--shadow);
        }

        .header-btn.active {
            background: var(--soft-pink);
            color: var(--warm-gray);
        }

        /* 筛选区 */
        .filter-section {
            max-width: 1200px;
            margin: 0 auto 25px;
            padding: 0 20px;
        }

        .filter-group {
            margin-bottom: 15px;
        }

        .filter-label {
            font-size: 0.8rem;
            color: var(--text-light);
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .filter-label::before {
            content: '';
            width: 4px;
            height: 16px;
            background: var(--dusty-pink);
            border-radius: 2px;
        }

        .filter-tags {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .filter-btn {
            padding: 8px 18px;
            border-radius: 20px;
            border: 1px solid #e0e0e0;
            background: white;
            color: var(--text-light);
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.3s;
        }

        .filter-btn:hover {
            border-color: var(--dusty-pink);
            color: var(--dusty-pink);
        }

        .filter-btn.active {
            background: var(--soft-pink);
            border-color: var(--soft-pink);
            color: var(--warm-gray);
        }

        /* 添加按钮 */
        .add-btn {
            position: fixed;
            bottom: 30px;
            right: 30px;
            width: 56px;
            height: 56px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--soft-pink), var(--dusty-pink));
            border: none;
            color: white;
            font-size: 1.8rem;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(248, 187, 217, 0.4);
            transition: all 0.3s;
            z-index: 100;
        }

        .add-btn:hover {
            transform: scale(1.1) rotate(90deg);
        }

        /* 弹窗 */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(254, 252, 248, 0.95);
            justify-content: center;
            align-items: center;
            z-index: 200;
            padding: 20px;
        }

        .modal.active {
            display: flex;
        }

        .form-container {
            background: white;
            padding: 35px;
            border-radius: 24px;
            width: 100%;
            max-width: 500px;
            max-height: 90vh;
            overflow-y: auto;
            box-shadow: 0 10px 40px var(--shadow);
        }

        .form-container h2 {
            font-size: 1.4rem;
            font-weight: 400;
            color: var(--warm-gray);
            margin-bottom: 25px;
            text-align: center;
        }

        .form-group {
            margin-bottom: 18px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: var(--text-light);
            font-size: 0.85rem;
        }

        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 12px 16px;
            border: 1.5px solid #e8e8e8;
            border-radius: 12px;
            background: var(--cream);
            color: var(--text);
            font-size: 0.95rem;
            transition: all 0.3s;
        }

        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: var(--dusty-pink);
            background: white;
        }

        .form-group textarea {
            min-height: 100px;
            resize: vertical;
        }

        /* 类别选择 */
        .tag-selector {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .tag-option {
            padding: 8px 16px;
            background: var(--cream);
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.85rem;
            transition: all 0.2s;
            border: 1.5px solid transparent;
        }

        .tag-option:hover {
            border-color: var(--soft-green);
        }

        .tag-option.selected {
            background: var(--sage);
            color: #2e7d32;
        }

        .category-manage {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-top: 10px;
            align-items: center;
        }

        .category-tag {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 6px 14px;
            background: var(--lavender);
            border-radius: 20px;
            font-size: 0.85rem;
            color: #6a1b9a;
        }

        .category-tag .remove-cat {
            cursor: pointer;
            opacity: 0.6;
            transition: opacity 0.2s;
        }

        .category-tag .remove-cat:hover {
            opacity: 1;
        }

        .add-category-btn {
            padding: 6px 14px;
            background: transparent;
            border: 2px dashed var(--soft-blue);
            color: var(--soft-blue);
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.85rem;
            transition: all 0.3s;
        }

        .add-category-btn:hover {
            border-color: var(--dusty-pink);
            color: var(--dusty-pink);
        }

        .add-category-input {
            display: none;
            gap: 8px;
        }

        .add-category-input.active {
            display: flex;
        }

        .add-category-input input {
            width: 120px !important;
            padding: 6px 12px !important;
        }

        .add-category-input button {
            padding: 6px 14px;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            font-size: 0.85rem;
        }

        .form-buttons {
            display: flex;
            gap: 12px;
            margin-top: 25px;
        }

        .btn {
            flex: 1;
            padding: 14px;
            border-radius: 12px;
            border: none;
            font-size: 0.95rem;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--soft-pink), var(--dusty-pink));
            color: white;
        }

        .btn-secondary {
            background: var(--cream);
            color: var(--text-light);
        }

        .btn-danger {
            background: #ffebee;
            color: #c62828;
        }

        .btn-save-note {
            background: var(--sage);
            color: #2e7d32;
        }

        .btn-cancel-note {
            background: var(--cream);
            color: var(--text-light);
        }

        .btn:hover {
            transform: translateY(-2px);
        }

        /* 书架 */
        .bookshelf {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px 60px;
        }

        .shelf-row {
            background: linear-gradient(180deg, #d7ccc8 0%, #a1887f 50%, #8d6e63 100%);
            padding: 30px 35px 50px;
            margin-bottom: 40px;
            border-radius: 8px;
            box-shadow: 
                inset 0 8px 20px rgba(0,0,0,0.1),
                0 8px 25px var(--shadow);
            position: relative;
        }

        .shelf-row::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 20px;
            background: linear-gradient(180deg, rgba(0,0,0,0.1), rgba(0,0,0,0.25));
        }

        .games-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 28px;
            justify-content: flex-start;
            align-items: flex-end;
            min-height: 220px;
        }

        .games-grid.dragging .game-book {
            cursor: grab;
        }

        /* 游戏书本 */
        .game-book {
            width: 130px;
            cursor: pointer;
            transition: all 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
            transform-origin: bottom center;
            position: relative;
        }

        .game-book:hover {
            transform: translateY(-12px) scale(1.03);
        }

        .game-book.dragging {
            opacity: 0.5;
            transform: scale(1.08);
        }

        .book-spine {
            width: 100%;
            height: 175px;
            border-radius: 4px 10px 10px 4px;
            position: relative;
            box-shadow: 
                -4px 6px 15px rgba(0,0,0,0.15),
                inset 3px 0 6px rgba(255,255,255,0.25);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            background: white;
        }

        .book-spine::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            width: 12px;
            background: linear-gradient(90deg, 
                rgba(255,255,255,0.4) 0%,
                rgba(255,255,255,0.15) 50%,
                rgba(0,0,0,0.08) 100%
            );
            z-index: 2;
        }

        .book-cover-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .book-no-cover {
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, var(--soft-pink), var(--lavender));
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 15px;
        }

        .book-no-cover span {
            writing-mode: vertical-rl;
            text-orientation: mixed;
            color: var(--warm-gray);
            font-size: 0.95rem;
            letter-spacing: 0.1em;
        }

        .lang-tag {
            position: absolute;
            top: 8px;
            right: 8px;
            background: rgba(255,255,255,0.9);
            color: var(--text);
            font-size: 0.65rem;
            padding: 4px 10px;
            border-radius: 12px;
            z-index: 3;
            backdrop-filter: blur(4px);
        }

        .category-tag-display {
            position: absolute;
            bottom: 10px;
            left: 10px;
            right: 10px;
            background: rgba(255,255,255,0.92);
            color: var(--warm-gray);
            font-size: 0.7rem;
            padding: 4px 10px;
            border-radius: 12px;
            text-align: center;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            z-index: 3;
            backdrop-filter: blur(4px);
        }

        .progress-bar {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: rgba(0,0,0,0.06);
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--soft-green), #81c784);
            transition: width 0.4s;
        }

        .book-info {
            margin-top: 12px;
            text-align: center;
        }

        .book-title {
            font-size: 0.9rem;
            color: var(--text);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            font-weight: 500;
        }

        .book-platform {
            font-size: 0.75rem;
            color: var(--text-light);
            margin-top: 4px;
        }

        /* 拖拽提示 */
        .drag-hint {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--sage);
            color: #2e7d32;
            padding: 12px 28px;
            border-radius: 25px;
            font-size: 0.9rem;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
            z-index: 150;
            box-shadow: 0 4px 15px var(--shadow);
        }

        .drag-hint.show {
            opacity: 1;
        }

        /* 详情弹窗 */
        .detail-cover {
            width: 100%;
            height: 200px;
            object-fit: cover;
            border-radius: 16px;
            margin-bottom: 20px;
        }

        .detail-item {
            margin-bottom: 16px;
            padding-bottom: 16px;
            border-bottom: 1px solid #f0f0f0;
        }

        .detail-item:last-of-type {
            border-bottom: none;
        }

        .detail-label {
            font-size: 0.8rem;
            color: var(--text-light);
            margin-bottom: 6px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .detail-value {
            color: var(--text);
            word-break: break-all;
        }

        .detail-value a {
            color: var(--dusty-pink);
            text-decoration: none;
        }

        .detail-value a:hover {
            text-decoration: underline;
        }

        /* 笔记编辑 */
        .note-editor {
            background: var(--cream);
            border-radius: 12px;
            padding: 16px;
            margin-top: 10px;
        }

        .note-display {
            white-space: pre-wrap;
            line-height: 1.7;
            color: var(--text);
            min-height: 60px;
            font-size: 0.95rem;
        }

        .note-edit-area {
            display: none;
            width: 100%;
            min-height: 120px;
            background: white;
            border: 2px solid var(--soft-pink);
            border-radius: 10px;
            padding: 12px;
            color: var(--text);
            font-family: inherit;
            font-size: 0.95rem;
            resize: vertical;
        }

        .note-edit-area.active {
            display: block;
        }

        .note-display.hidden {
            display: none;
        }

        .note-actions {
            display: flex;
            gap: 10px;
            margin-top: 12px;
        }

        .note-actions button {
            padding: 8px 18px;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            font-size: 0.85rem;
        }

        /* 空状态 */
        .empty-state {
            text-align: center;
            padding: 80px 20px;
            color: var(--text-light);
            width: 100%;
        }

        .empty-state h3 {
            font-size: 1.3rem;
            font-weight: 400;
            color: var(--warm-gray);
            margin-bottom: 10px;
        }

        /* 统计信息 */
        .stats-bar {
            max-width: 1200px;
            margin: 0 auto 20px;
            padding: 0 20px;
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            font-size: 0.85rem;
            color: var(--text-light);
        }

        .stat-item {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .stat-item span {
            color: var(--dusty-pink);
            font-weight: 500;
        }

        /* 滚动条 */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }

        ::-webkit-scrollbar-track {
            background: var(--cream);
        }

        ::-webkit-scrollbar-thumb {
            background: var(--soft-pink);
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--dusty-pink);
        }
    </style>
</head>
<body>
    <header>
        <h1>ゲーム棚 <span>我的游戏书架</span></h1>
    </header>

    <div class="breadcrumb">
        <a href="index.html">首页</a> / 游戏书架
    </div>

    <div class="action-bar">
        <button class="header-btn" id="dragModeBtn" onclick="toggleDragMode()">
            🔀 排序模式
        </button>
        <button class="header-btn" onclick="manageCategories()">
            🏷️ 管理类别
        </button>
        <button class="header-btn" onclick="exportData()">
            💾 导出备份
        </button>
        <button class="header-btn" onclick="document.getElementById('importFile').click()">
            📥 导入恢复
        </button>
        <input type="file" id="importFile" accept=".json" style="display:none" onchange="importData(this)">
    </div>

    <!-- 统计 -->
    <div class="stats-bar" id="statsBar">
        <div class="stat-item">📚 总计: <span id="totalCount">0</span></div>
        <div class="stat-item">✅ 已完成: <span id="completedCount">0</span></div>
        <div class="stat-item">🎮 进行中: <span id="playingCount">0</span></div>
    </div>

    <!-- 筛选区 -->
    <div class="filter-section">
        <!-- 平台筛选 -->
        <div class="filter-group">
            <div class="filter-label">平台</div>
            <div class="filter-tags" id="platformFilters">
                <button class="filter-btn active" data-filter="all" data-type="platform">全部</button>
                <button class="filter-btn" data-filter="PC" data-type="platform">PC</button>
                <button class="filter-btn" data-filter="PSP" data-type="platform">PSP</button>
                <button class="filter-btn" data-filter="PSV" data-type="platform">PSV</button>
                <button class="filter-btn" data-filter="NDS" data-type="platform">NDS</button>
                <button class="filter-btn" data-filter="3DS" data-type="platform">3DS</button>
                <button class="filter-btn" data-filter="Switch" data-type="platform">Switch</button>
                <button class="filter-btn" data-filter="iOS" data-type="platform">iOS</button>
                <button class="filter-btn" data-filter="Android" data-type="platform">Android</button>
            </div>
        </div>
        
        <!-- 类别筛选 -->
        <div class="filter-group">
            <div class="filter-label">类别</div>
            <div class="filter-tags" id="categoryFilters">
                <button class="filter-btn active" data-filter="all" data-type="category">全部</button>
                <!-- 动态生成 -->
            </div>
        </div>
    </div>

    <!-- 书架 -->
    <div class="bookshelf" id="bookshelf">
        <div class="shelf-row">
            <div class="games-grid" id="gamesGrid">
                <div class="empty-state">
                    <h3>📚 书架是空的</h3>
                    <p>点击右下角 + 添加你的第一个游戏</p>
                </div>
            </div>
        </div>
    </div>

    <div class="drag-hint" id="dragHint">拖拽书本调整顺序</div>

    <button class="add-btn" onclick="openAddModal()">+</button>

    <!-- 添加/编辑弹窗 -->
    <div class="modal" id="gameModal">
        <div class="form-container">
            <h2 id="modalTitle">📖 添加游戏</h2>
            <form id="gameForm">
                <input type="hidden" id="editId">
                
                <div class="form-group">
                    <label>原名称 *</label>
                    <input type="text" id="originalName" placeholder="The Legend of Zelda" required>
                </div>
                
                <div class="form-group">
                    <label>中文名称</label>
                    <input type="text" id="chineseName" placeholder="塞尔达传说">
                </div>
                
                <div class="form-group">
                    <label>平台 *</label>
                    <select id="platform" required>
                        <option value="">选择平台</option>
                        <option value="PC">PC</option>
                        <option value="PSP">PSP</option>
                        <option value="PSV">PSV</option>
                        <option value="NDS">NDS</option>
                        <option value="3DS">3DS</option>
                        <option value="Switch">Switch</option>
                        <option value="iOS">iOS</option>
                        <option value="Android">Android</option>
                    </select>
                </div>
                
                <div class="form-group">
                    <label>语言</label>
                    <select id="language">
                        <option value="中文">中文</option>
                        <option value="日文">日文</option>
                        <option value="英文">英文</option>
                        <option value="其他">其他</option>
                    </select>
                </div>
                
                <div class="form-group">
                    <label>游戏类别 *</label>
                    <div class="tag-selector" id="categorySelector"></div>
                    <input type="hidden" id="selectedCategory" required>
                </div>
                
                <div class="form-group">
                    <label>封面链接</label>
                    <input type="url" id="coverUrl" placeholder="https://...">
                </div>
                
                <div class="form-group">
                    <label>攻略链接</label>
                    <input type="url" id="guideUrl" placeholder="https://...">
                </div>
                
                <div class="form-group">
                    <label>进度 (%)</label>
                    <input type="number" id="progress" min="0" max="100" value="0">
                </div>
                
                <div class="form-group">
                    <label>笔记</label>
                    <textarea id="note" placeholder="游戏心得、进度记录、攻略要点..."></textarea>
                </div>
                
                <div class="form-buttons">
                    <button type="button" class="btn btn-secondary" onclick="closeModal('gameModal')">取消</button>
                    <button type="submit" class="btn btn-primary">保存</button>
                </div>
            </form>
        </div>
    </div>

    <!-- 详情弹窗 -->
    <div class="modal" id="detailModal">
        <div class="form-container" id="detailContent"></div>
    </div>

    <!-- 类别管理弹窗 -->
    <div class="modal" id="categoryModal">
        <div class="form-container" style="max-width: 420px;">
            <h2>🏷️ 管理游戏类别</h2>
            <div class="form-group">
                <label>当前类别（点击 × 删除）</label>
                <div class="category-manage" id="categoryManageList"></div>
            </div>
            <div class="form-group">
                <label>添加新类别</label>
                <div class="add-category-input" id="addCatInput">
                    <input type="text" id="newCategoryName" placeholder="类别名称" maxlength="10">
                    <button class="btn-save-note" onclick="confirmAddCategory()">✓</button>
                    <button class="btn-cancel-note" onclick="cancelAddCategory()">✕</button>
                </div>
                <button class="add-category-btn" id="showAddCatBtn" onclick="showAddCategory()">+ 添加类别</button>
            </div>
            <div class="form-buttons" style="margin-top: 25px;">
                <button type="button" class="btn btn-secondary" onclick="closeModal('categoryModal')">关闭</button>
            </div>
        </div>
    </div>

    <script>
        // ============ 数据存储 ============
        let games = JSON.parse(localStorage.getItem('myGames')) || [];
        let categories = JSON.parse(localStorage.getItem('myCategories')) || ['乙女', '推理', '经营'];
        let currentPlatformFilter = 'all';
        let currentCategoryFilter = 'all';
        let dragMode = false;
        let draggedItem = null;

        // ============ 初始化 ============
        document.addEventListener('DOMContentLoaded', () => {
            renderGames();
            renderFilters();
            renderCategoryFilters();
            initForm();
            updateStats();
        });

        // ============ 渲染游戏 ============
        function renderGames() {
            const grid = document.getElementById('gamesGrid');
            
            let filtered = games;
            
            // 平台筛选
            if (currentPlatformFilter !== 'all') {
                filtered = filtered.filter(g => g.platform === currentPlatformFilter);
            }
            
            // 类别筛选
            if (currentCategoryFilter !== 'all') {
                filtered = filtered.filter(g => g.category === currentCategoryFilter);
            }

            if (filtered.length === 0) {
                grid.innerHTML = `
                    <div class="empty-state">
                        <h3>📚 没有找到游戏</h3>
                        <p>尝试调整筛选条件或添加新游戏</p>
                    </div>
                `;
                return;
            }

            grid.innerHTML = filtered.map((game, index) => `
                <div class="game-book" 
                     data-id="${game.id}" 
                     data-index="${games.indexOf(game)}"
                     onclick="${dragMode ? '' : `showDetail('${game.id}')`}"
                     draggable="${dragMode}"
                     ondragstart="handleDragStart(event, '${game.id}')"
                     ondragend="handleDragEnd(event)"
                     ondragover="handleDragOver(event)"
                     ondrop="handleDrop(event, '${game.id}')">
                    <div class="book-spine">
                        ${game.coverUrl ? `
                            <img src="${game.coverUrl}" class="book-cover-img" alt="${game.chineseName || game.originalName}" 
                                 onerror="this.style.display='none'; this.parentElement.innerHTML='<div class=\\'book-no-cover\\'><span>${(game.chineseName || game.originalName).slice(0,8)}</span></div>'">
                        ` : `
                            <div class="book-no-cover">
                                <span>${(game.chineseName || game.originalName).slice(0, 8)}</span>
                            </div>
                        `}
                        <span class="lang-tag">${game.language}</span>
                        ${game.category ? `<span class="category-tag-display">${game.category}</span>` : ''}
                        <div class="progress-bar">
                            <div class="progress-fill" style="width: ${game.progress}%"></div>
                        </div>
                    </div>
                    <div class="book-info">
                        <div class="book-title">${game.chineseName || game.originalName}</div>
                        <div class="book-platform">${game.platform}</div>
                    </div>
                </div>
            `).join('');
        }

        // ============ 筛选功能 ============
        function renderFilters() {
            document.querySelectorAll('#platformFilters .filter-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    document.querySelectorAll('#platformFilters .filter-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    currentPlatformFilter = btn.dataset.filter;
                    renderGames();
                });
            });
        }

        function renderCategoryFilters() {
            const container = document.getElementById('categoryFilters');
            const buttons = categories.map(cat => 
                `<button class="filter-btn" data-filter="${cat}" data-type="category">${cat}</button>`
            ).join('');
            
            container.innerHTML = `
                <button class="filter-btn active" data-filter="all" data-type="category">全部</button>
                ${buttons}
            `;
            
            // 绑定事件
            container.querySelectorAll('.filter-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    container.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    currentCategoryFilter = btn.dataset.filter;
                    renderGames();
                });
            });
        }

        // ============ 统计 ============
        function updateStats() {
            document.getElementById('totalCount').textContent = games.length;
            document.getElementById('completedCount').textContent = games.filter(g => g.progress === 100).length;
            document.getElementById('playingCount').textContent = games.filter(g => g.progress > 0 && g.progress < 100).length;
        }

        // ============ 拖拽排序 ============
        function toggleDragMode() {
            dragMode = !dragMode;
            const btn = document.getElementById('dragModeBtn');
            const hint = document.getElementById('dragHint');
            const grid = document.getElementById('gamesGrid');
            
            if (dragMode) {
                btn.classList.add('active');
                btn.textContent = '✓ 完成排序';
                hint.classList.add('show');
                grid.classList.add('dragging');
                closeModal('detailModal');
            } else {
                btn.classList.remove('active');
                btn.textContent = '🔀 排序模式';
                hint.classList.remove('show');
                grid.classList.remove('dragging');
            }
            renderGames();
        }

        function handleDragStart(e, id) {
            if (!dragMode) return;
            draggedItem = games.find(g => g.id === id);
            e.target.classList.add('dragging');
            e.dataTransfer.effectAllowed = 'move';
        }

        function handleDragEnd(e) {
            e.target.classList.remove('dragging');
        }

        function handleDragOver(e) {
            if (!dragMode) return;
            e.preventDefault();
        }

        function handleDrop(e, targetId) {
            if (!dragMode || !draggedItem) return;
            e.preventDefault();
            
            const targetItem = games.find(g => g.id === targetId);
            if (draggedItem === targetItem) return;
            
            const fromIndex = games.indexOf(draggedItem);
            const toIndex = games.indexOf(targetItem);
            
            games.splice(fromIndex, 1);
            games.splice(toIndex, 0, draggedItem);
            
            saveGames();
            renderGames();
        }

        // ============ 表单功能 ============
        function initForm() {
            renderCategorySelector();
            
            document.getElementById('gameForm').addEventListener('submit', (e) => {
                e.preventDefault();
                saveGame();
            });
        }

        function renderCategorySelector(selected = '') {
            const container = document.getElementById('categorySelector');
            container.innerHTML = categories.map(cat => `
                <span class="tag-option ${cat === selected ? 'selected' : ''}" 
                      onclick="selectCategory('${cat}')">${cat}</span>
            `).join('');
        }

        function selectCategory(cat) {
            document.getElementById('selectedCategory').value = cat;
            document.querySelectorAll('#categorySelector .tag-option').forEach(el => {
                el.classList.toggle('selected', el.textContent === cat);
            });
        }

        function openAddModal() {
            document.getElementById('modalTitle').textContent = '📖 添加游戏';
            document.getElementById('gameForm').reset();
            document.getElementById('editId').value = '';
            document.getElementById('selectedCategory').value = '';
            renderCategorySelector();
            document.getElementById('gameModal').classList.add('active');
        }

        function openEditModal(id) {
            const game = games.find(g => g.id === id);
            if (!game) return;
            
            document.getElementById('modalTitle').textContent = '✏️ 编辑游戏';
            document.getElementById('editId').value = game.id;
            document.getElementById('originalName').value = game.originalName;
            document.getElementById('chineseName').value = game.chineseName || '';
            document.getElementById('platform').value = game.platform;
            document.getElementById('language').value = game.language;
            document.getElementById('coverUrl').value = game.coverUrl || '';
            document.getElementById('guideUrl').value = game.guideUrl || '';
            document.getElementById('progress').value = game.progress;
            document.getElementById('note').value = game.note || '';
            
            document.getElementById('selectedCategory').value = game.category || '';
            renderCategorySelector(game.category);
            
            closeModal('detailModal');
            document.getElementById('gameModal').classList.add('active');
        }

        function saveGame() {
            const id = document.getElementById('editId').value;
            const gameData = {
                originalName: document.getElementById('originalName').value,
                chineseName: document.getElementById('chineseName').value,
                platform: document.getElementById('platform').value,
                language: document.getElementById('language').value,
                category: document.getElementById('selectedCategory').value,
                coverUrl: document.getElementById('coverUrl').value,
                guideUrl: document.getElementById('guideUrl').value,
                progress: parseInt(document.getElementById('progress').value) || 0,
                note: document.getElementById('note').value
            };
            
            if (id) {
                const index = games.findIndex(g => g.id === id);
                games[index] = { ...games[index], ...gameData };
            } else {
                gameData.id = Date.now().toString();
                gameData.addedAt = new Date().toLocaleString();
                games.unshift(gameData);
            }
            
            saveGames();
            renderGames();
            updateStats();
            closeModal('gameModal');
        }

        // ============ 详情与笔记 ============
        function showDetail(id) {
            if (dragMode) return;
            const game = games.find(g => g.id === id);
            if (!game) return;

            const content = document.getElementById('detailContent');
            content.innerHTML = `
                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
                    <h2 style="color:var(--warm-gray); font-weight:400;">🎮 游戏详情</h2>
                    <button onclick="openEditModal('${game.id}')" class="btn" style="background:var(--soft-pink); color:white; padding:8px 20px; flex:0; width:auto;">✏️ 编辑</button>
                </div>
                
                ${game.coverUrl ? `<img src="${game.coverUrl}" class="detail-cover" onerror="this.style.display='none'">` : ''}
                
                <div class="detail-item">
                    <div class="detail-label">原名称</div>
                    <div class="detail-value">${game.originalName}</div>
                </div>
                
                ${game.chineseName ? `
                <div class="detail-item">
                    <div class="detail-label">中文名称</div>
                    <div class="detail-value">${game.chineseName}</div>
                </div>` : ''}
                
                <div class="detail-item">
                    <div class="detail-label">平台</div>
                    <div class="detail-value">${game.platform}</div>
                </div>
                
                <div class="detail-item">
                    <div class="detail-label">类别</div>
                    <div class="detail-value">${game.category || '未分类'}</div>
                </div>
                
                <div class="detail-item">
                    <div class="detail-label">语言</div>
                    <div class="detail-value">${game.language}</div>
                </div>
                
                <div class="detail-item">
                    <div class="detail-label">进度</div>
                    <div class="detail-value">
                        <div style="background:var(--cream); height:10px; border-radius:5px; margin:8px 0;">
                            <div style="background:linear-gradient(90deg,var(--soft-green),#81c784); height:100%; width:${game.progress}%; border-radius:5px;"></div>
                        </div>
                        <span style="color:var(--soft-green); font-weight:500;">${game.progress}%</span>
                    </div>
                </div>
                
                ${game.guideUrl ? `
                <div class="detail-item">
                    <div class="detail-label">攻略链接</div>
                    <div class="detail-value"><a href="${game.guideUrl}" target="_blank">${game.guideUrl}</a></div>
                </div>` : ''}
                
                <div class="detail-item">
                    <div class="detail-label" style="display:flex; justify-content:space-between; align-items:center;">
                        <span>📝 笔记</span>
                        <button onclick="startEditNote('${game.id}')" id="editNoteBtn" style="background:transparent; border:1px solid var(--soft-pink); color:var(--dusty-pink); padding:5px 14px; border-radius:8px; cursor:pointer; font-size:0.8rem;">编辑</button>
                    </div>
                    <div class="note-editor">
                        <div class="note-display" id="noteDisplay">${game.note || '暂无笔记...'}</div>
                        <textarea class="note-edit-area" id="noteEditArea">${game.note || ''}</textarea>
                        <div class="note-actions" id="noteActions" style="display:none;">
                            <button class="btn-save-note" onclick="saveNote('${game.id}')">保存</button>
                            <button class="btn-cancel-note" onclick="cancelEditNote()">取消</button>
                        </div>
                    </div>
                </div>
                
                <div class="detail-item">
                    <div class="detail-label">添加时间</div>
                    <div class="detail-value" style="color:var(--text-light); font-size:0.85rem;">${game.addedAt}</div>
                </div>
                
                <div class="form-buttons" style="margin-top:20px;">
                    <button type="button" class="btn btn-secondary" onclick="closeModal('detailModal')">关闭</button>
                    <button type="button" class="btn btn-danger" onclick="deleteGame('${game.id}')">🗑️ 删除</button>
                </div>
            `;
            
            document.getElementById('detailModal').classList.add('active');
        }

        function startEditNote(id) {
            document.getElementById('noteDisplay').classList.add('hidden');
            document.getElementById('noteEditArea').classList.add('active');
            document.getElementById('noteActions').style.display = 'flex';
            document.getElementById('editNoteBtn').style.display = 'none';
        }

        function saveNote(id) {
            const newNote = document.getElementById('noteEditArea').value;
            const game = games.find(g => g.id === id);
            game.note = newNote;
            saveGames();
            renderGames();
            cancelEditNote();
            document.getElementById('noteDisplay').textContent = newNote || '暂无笔记...';
        }

        function cancelEditNote() {
            document.getElementById('noteDisplay').classList.remove('hidden');
            document.getElementById('noteEditArea').classList.remove('active');
            document.getElementById('noteActions').style.display = 'none';
            document.getElementById('editNoteBtn').style.display = 'block';
        }

        // ============ 类别管理 ============
        function manageCategories() {
            renderCategoryManage();
            document.getElementById('categoryModal').classList.add('active');
        }

        function renderCategoryManage() {
            const container = document.getElementById('categoryManageList');
            container.innerHTML = categories.map(cat => `
                <span class="category-tag">
                    ${cat}
                    <span class="remove-cat" onclick="removeCategory('${cat}')">×</span>
                </span>
            `).join('');
        }

        function showAddCategory() {
            document.getElementById('showAddCatBtn').style.display = 'none';
            document.getElementById('addCatInput').classList.add('active');
            document.getElementById('newCategoryName').focus();
        }

        function cancelAddCategory() {
            document.getElementById('showAddCatBtn').style.display = 'block';
            document.getElementById('addCatInput').classList.remove('active');
            document.getElementById('newCategoryName').value = '';
        }

        function confirmAddCategory() {
            const name = document.getElementById('newCategoryName').value.trim();
            if (!name) return;
            if (categories.includes(name)) {
                alert('该类别已存在');
                return;
            }
            if (categories.length >= 20) {
                alert('类别数量已达上限');
                return;
            }
            categories.push(name);
            localStorage.setItem('myCategories', JSON.stringify(categories));
            renderCategoryManage();
            renderCategoryFilters();
            cancelAddCategory();
        }

        function removeCategory(cat) {
            if (!confirm(`确定删除类别"${cat}"？\n使用该类别的游戏将变为未分类`)) return;
            categories = categories.filter(c => c !== cat);
            localStorage.setItem('myCategories', JSON.stringify(categories));
            games.forEach(g => { if (g.category === cat) g.category = ''; });
            saveGames();
            renderCategoryManage();
            renderCategoryFilters();
            renderGames();
        }

        // ============ 数据操作 ============
        function saveGames() {
            localStorage.setItem('myGames', JSON.stringify(games));
        }

        function deleteGame(id) {
            if (!confirm('确定要删除这个游戏吗？')) return;
            games = games.filter(g => g.id !== id);
            saveGames();
            renderGames();
            updateStats();
            closeModal('detailModal');
        }

        function exportData() {
            const data = { games, categories, exportTime: new Date().toLocaleString() };
            const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `游戏书架备份_${new Date().toISOString().slice(0,10)}.json`;
            a.click();
            URL.revokeObjectURL(url);
        }

        function importData(input) {
            const file = input.files[0];
            if (!file) return;
            
            const reader = new FileReader();
            reader.onload = (e) => {
                try {
                    const data = JSON.parse(e.target.result);
                    if (data.games) {
                        games = data.games;
                        saveGames();
                    }
                    if (data.categories) {
                        categories = data.categories;
                        localStorage.setItem('myCategories', JSON.stringify(categories));
                    }
                    renderGames();
                    renderCategoryFilters();
                    updateStats();
                    alert('数据恢复成功！');
                } catch (err) {
                    alert('文件格式错误');
                }
            };
            reader.readAsText(file);
            input.value = '';
        }

        function closeModal(id) {
            document.getElementById(id).classList.remove('active');
        }

        document.querySelectorAll('.modal').forEach(modal => {
            modal.addEventListener('click', (e) => {
                if (e.target === modal) closeModal(modal.id);
            });
        });

        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                document.querySelectorAll('.modal.active').forEach(m => closeModal(m.id));
            }
        });
    </script>
</body>
</html>
