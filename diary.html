<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>日记 | Diary</title>
    <link rel="manifest" href="manifest-diary.json">
    <meta name="theme-color" content="#90caf9">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="日记">
    <link rel="apple-touch-icon" href="diary-icon-192.png">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* 导出按钮 */
.export-btn {
    position: fixed;
    bottom: 170px;
    right: 30px;
    width: 50px;
    height: 50px;
    border-radius: 50%;
    background: white;
    border: none;
    color: var(--deep-blue);
    font-size: 1.3rem;
    cursor: pointer;
    box-shadow: 0 4px 15px var(--shadow);
    transition: all 0.3s;
    z-index: 100;
}

.export-btn:hover {
    transform: scale(1.1);
}

/* 导出预览 */
.export-preview {
    background: var(--cream);
    border-radius: 12px;
    padding: 15px;
    margin: 15px 0;
    max-height: 200px;
    overflow-y: auto;
}

.preview-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 10px;
    padding-bottom: 8px;
    border-bottom: 1px solid #e0e0e0;
    font-size: 0.85rem;
    color: var(--text-light);
}

.preview-list {
    font-size: 0.9rem;
}

.preview-item {
    padding: 8px 0;
    border-bottom: 1px solid #f0f0f0;
    display: flex;
    justify-content: space-between;
}

.preview-item:last-child {
    border-bottom: none;
}

.preview-date {
    color: var(--deep-blue);
    font-weight: 500;
}

.preview-title {
    color: var(--text-light);
    flex: 1;
    margin-left: 10px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
}

        :root {
            --cream: #f5f7fa;
            --soft-blue: #e3f2fd;
            --sky: #bbdefb;
            --light-blue: #90caf9;
            --blue: #64b5f6;
            --deep-blue: #42a5f5;
            --navy: #1a237e;
            --warm-gray: #546e7a;
            --text: #37474f;
            --text-light: #78909c;
            --shadow: rgba(0,0,0,0.06);
        }

        body {
            min-height: 100vh;
            background: var(--cream);
            font-family: 'Hiragino Sans', 'Noto Sans JP', -apple-system, BlinkMacSystemFont, sans-serif;
            color: var(--text);
            line-height: 1.7;
            -webkit-overflow-scrolling: touch;
        }

        /* 头部 */
        header {
            background: linear-gradient(180deg, var(--soft-blue) 0%, var(--cream) 100%);
            padding: 40px 20px 25px;
            text-align: center;
            position: relative;
        }

        header::before {
            content: '☁️';
            position: absolute;
            top: 15px;
            left: 20px;
            font-size: 1.5rem;
            opacity: 0.5;
        }

        header::after {
            content: '✨';
            position: absolute;
            top: 20px;
            right: 25px;
            font-size: 1.3rem;
            opacity: 0.5;
        }

        header h1 {
            font-size: 1.9rem;
            font-weight: 400;
            color: var(--navy);
            letter-spacing: 0.15em;
        }

        header h1 span {
            display: block;
            font-size: 0.85rem;
            color: var(--text-light);
            margin-top: 6px;
            letter-spacing: 0.1em;
        }

        /* 导航 */
        .breadcrumb {
            max-width: 800px;
            margin: 0 auto;
            padding: 15px 20px;
            font-size: 0.85rem;
            color: var(--text-light);
        }

        .breadcrumb a {
            color: var(--blue);
            text-decoration: none;
        }

        /* 统计栏 */
        .stats-bar {
            max-width: 800px;
            margin: 0 auto 20px;
            padding: 0 20px;
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
        }

        .stat-item {
            background: white;
            padding: 10px 20px;
            border-radius: 20px;
            font-size: 0.85rem;
            color: var(--text-light);
            box-shadow: 0 2px 8px var(--shadow);
        }

        .stat-item span {
            color: var(--deep-blue);
            font-weight: 500;
        }

        /* 日记列表 */
        .diary-container {
            max-width: 800px;
            margin: 0 auto;
            padding: 0 20px 100px;
        }

        .diary-entry {
            background: white;
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 4px 15px var(--shadow);
            position: relative;
            animation: fadeIn 0.4s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .entry-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 15px;
            padding-bottom: 12px;
            border-bottom: 1px solid #f0f4f8;
        }

        .entry-date {
            display: flex;
            flex-direction: column;
        }

        .entry-day {
            font-size: 2rem;
            font-weight: 300;
            color: var(--deep-blue);
            line-height: 1;
        }

        .entry-month-year {
            font-size: 0.8rem;
            color: var(--text-light);
            margin-top: 4px;
        }

        .entry-weekday {
            font-size: 0.75rem;
            color: var(--light-blue);
            background: var(--soft-blue);
            padding: 4px 12px;
            border-radius: 12px;
        }

        .entry-actions {
            display: flex;
            gap: 8px;
        }

        .entry-btn {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            border: none;
            background: var(--cream);
            color: var(--text-light);
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .entry-btn:hover {
            background: var(--soft-blue);
            color: var(--deep-blue);
        }

        .entry-content {
            color: var(--text);
            line-height: 1.9;
            white-space: pre-wrap;
            margin-bottom: 15px;
        }

        .entry-images {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
            gap: 10px;
            margin-top: 15px;
        }

        .entry-image {
            aspect-ratio: 1;
            border-radius: 12px;
            overflow: hidden;
            cursor: pointer;
            position: relative;
        }

        .entry-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.3s;
        }

        .entry-image:hover img {
            transform: scale(1.05);
        }

        /* 空状态 */
        .empty-state {
            text-align: center;
            padding: 80px 20px;
            color: var(--text-light);
        }

        .empty-state .icon {
            font-size: 4rem;
            margin-bottom: 20px;
            opacity: 0.5;
        }

        .empty-state h3 {
            font-size: 1.2rem;
            font-weight: 400;
            color: var(--warm-gray);
            margin-bottom: 10px;
        }

        /* 添加按钮 */
        .add-btn {
            position: fixed;
            bottom: 30px;
            right: 30px;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--light-blue), var(--deep-blue));
            border: none;
            color: white;
            font-size: 2rem;
            cursor: pointer;
            box-shadow: 0 6px 20px rgba(66, 165, 245, 0.4);
            transition: all 0.3s;
            z-index: 100;
        }

        .add-btn:hover {
            transform: scale(1.1) rotate(90deg);
        }

<!-- 导出按钮 -->
<button class="export-btn" onclick="openExportModal()" title="导出PDF">📄</button>

<!-- 导出弹窗 -->
<div class="modal" id="exportModal">
    <div class="form-container" style="max-width: 500px;">
        <h2>📄 导出日记为 PDF</h2>
        
        <div class="form-group">

                <span>至</span>
                <input type="date" id="exportEndDate" style="flex: 1;">

        </div>
        
        <div class="form-group">
            <label>导出选项</label>

                <label style="display: flex; align-items: center; gap: 6px; cursor: pointer;">

            </div>
        </div>
        
        <div class="export-preview" id="exportPreview">
            <div class="preview-header">
                <span>📋 预览</span>
                <span id="previewCount">0 篇日记</span>

            </div>
        </div>
        
        <div class="form-buttons">
            <button type="button" class="btn btn-secondary" onclick="closeModal('exportModal')">取消</button>
            <button type="button" class="btn btn-primary" onclick="generatePDF()" id="generateBtn" disabled>生成 PDF</button>
        </div>
    </div>
</div>

<!-- PDF 生成进度 -->

        </div>
        <p id="pdfStatus" style="color: var(--text-light); font-size: 0.9rem;">准备中...</p>
    </div>
</div>

    <script>
// ============ JSONBin.io 配置 ============
function getJSONBinConfig() {
    // 优先使用日记专用配置，否则使用游戏书架的配置
    return {
        BIN_ID: localStorage.getItem('diary_bin_id') || localStorage.getItem('jsonbin_bin_id') || '',
        API_KEY: localStorage.getItem('diary_api_key') || localStorage.getItem('jsonbin_api_key') || ''
    };
}

// ============ 数据存储 ============
let entries = [];
let currentImages = []; // 当前编辑的图片列表

// ============ 初始化 ============
document.addEventListener('DOMContentLoaded', async () => {
    const config = getJSONBinConfig();
    
    if (!config.BIN_ID || !config.API_KEY) {
        showToast('⚙️ 请先配置同步设置');
        entries = JSON.parse(localStorage.getItem('diary_entries')) || [];
    } else {
        showLoading(true);
        await loadFromJSONBin();
        showLoading(false);
    }
    
    renderEntries();
    updateStats();
});

// ============ JSONBin.io 操作 ============
async function loadFromJSONBin() {
    const config = getJSONBinConfig();
    if (!config.BIN_ID) return false;
    
    try {
        const response = await fetch(`https://api.jsonbin.io/v3/b/${config.BIN_ID}/latest`, {
            headers: { 'X-Master-Key': config.API_KEY }
        });
        
        if (!response.ok) throw new Error('Load failed');
        
        const data = await response.json();
        
        // 支持独立存储或与游戏书架共用
        if (data.record.entries) {
            entries = data.record.entries;
        } else if (data.record.diary) {
            entries = data.record.diary;
        } else {
            // 共用 Bin，但数据分开存储
            entries = data.record.diary_entries || [];
        }
        
        localStorage.setItem('diary_entries', JSON.stringify(entries));
        showToast('✅ 日记已同步');
        return true;
        
    } catch (err) {
        console.error('同步失败:', err);
        showToast('❌ 使用本地数据');
        entries = JSON.parse(localStorage.getItem('diary_entries')) || [];
        return false;
    }
}

async function saveToJSONBin() {
    const config = getJSONBinConfig();
    if (!config.BIN_ID || !config.API_KEY) {
        localStorage.setItem('diary_entries', JSON.stringify(entries));
        return false;
    }
    
    try {
        // 先读取现有数据，避免覆盖游戏书架的数据
        const readRes = await fetch(`https://api.jsonbin.io/v3/b/${config.BIN_ID}/latest`, {
            headers: { 'X-Master-Key': config.API_KEY }
        });
        
        let existingData = {};
        if (readRes.ok) {
            existingData = (await readRes.json()).record;
        }
        
        // 合并数据，保留游戏书架的数据
        const saveData = {
            ...existingData,
            entries: entries,  // 日记数据
            diary_entries: entries  // 兼容字段
        };
        
        const response = await fetch(`https://api.jsonbin.io/v3/b/${config.BIN_ID}`, {
            method: 'PUT',
            headers: {
                'Content-Type': 'application/json',
                'X-Master-Key': config.API_KEY
            },
            body: JSON.stringify(saveData)
        });
        
        if (!response.ok) throw new Error('Save failed');
        
        localStorage.setItem('diary_entries', JSON.stringify(entries));
        showToast('✅ 已保存到云端');
        return true;
        
    } catch (err) {
        console.error('保存失败:', err);
        showToast('❌ 已保存到本地');
        localStorage.setItem('diary_entries', JSON.stringify(entries));
        return false;
    }
}

// ============ 配置管理 ============
function openConfigModal() {
    const config = getJSONBinConfig();
    document.getElementById('binId').value = config.BIN_ID;
    document.getElementById('apiKey').value = config.API_KEY;
    document.getElementById('configModal').classList.add('active');
}

async function saveConfig() {
    const binId = document.getElementById('binId').value.trim();
    const apiKey = document.getElementById('apiKey').value.trim();
    
    if (!binId || !apiKey) {
        alert('请填写完整的配置信息');
        return;
    }
    
    localStorage.setItem('diary_bin_id', binId);
    localStorage.setItem('diary_api_key', apiKey);
    
    closeModal('configModal');
    showToast('配置已保存，正在同步...');
    
    await loadFromJSONBin();
    renderEntries();
    updateStats();
}

// ============ 日记操作 ============
function openAddModal() {
    document.getElementById('modalTitle').textContent = '📝 写日记';
    document.getElementById('entryForm').reset();
    document.getElementById('editId').value = '';
    currentImages = [];
    updateImagePreview();
    document.getElementById('entryModal').classList.add('active');
}

function openEditModal(id) {
    const entry = entries.find(e => e.id === id);
    if (!entry) return;
    
    document.getElementById('modalTitle').textContent = '✏️ 编辑日记';
    document.getElementById('editId').value = entry.id;
    document.getElementById('entryTitle').value = entry.title || '';
    document.getElementById('entryContent').value = entry.content || '';
    currentImages = entry.images || [];
    updateImagePreview();
    
    document.getElementById('entryModal').classList.add('active');
}

async function saveEntry(e) {
    e.preventDefault();
    
    const id = document.getElementById('editId').value;
    const now = new Date();
    
    const entryData = {
        title: document.getElementById('entryTitle').value.trim(),
        content: document.getElementById('entryContent').value.trim(),
        images: currentImages,
        updatedAt: now.toISOString()
    };
    
    if (id) {
        // 编辑：删除原位置，更新后置顶
        const index = entries.findIndex(e => e.id === id);
        entryData.id = id;
        entryData.createdAt = entries[index].createdAt;
        
        entries.splice(index, 1);
        entries.unshift(entryData);
    } else {
        // 新建：置顶
        entryData.id = Date.now().toString();
        entryData.createdAt = now.toISOString();
        entries.unshift(entryData);
    }
    
    await saveToJSONBin();
    renderEntries();
    updateStats();
    closeModal('entryModal');
    currentImages = [];
}

document.getElementById('entryForm').addEventListener('submit', saveEntry);

async function deleteEntry(id) {
    if (!confirm('确定要删除这篇日记吗？')) return;
    
    entries = entries.filter(e => e.id !== id);
    await saveToJSONBin();
    renderEntries();
    updateStats();
}

// ============ 图片处理 ============
function selectImages() {
    document.getElementById('imageInput').click();
}

function handleImageSelect(event) {
    const files = event.target.files;
    if (!files.length) return;
    
    Array.from(files).forEach(file => {
        if (currentImages.length >= 9) {
            showToast('最多添加9张图片');
            return;
        }
        
        const reader = new FileReader();
        reader.onload = (e) => {
            currentImages.push(e.target.result);
            updateImagePreview();
        };
        reader.readAsDataURL(file);
    });
    
    event.target.value = '';
}

function updateImagePreview() {
    const container = document.getElementById('imageUploadArea');
    container.innerHTML = '';
    
    // 显示已选图片
    currentImages.forEach((img, index) => {
        const div = document.createElement('div');
        div.className = 'image-preview';
        div.innerHTML = `
            <img src="${img}" alt="">
            <button type="button" class="remove-img" onclick="removeImage(${index})">×</button>
        `;
        container.appendChild(div);
    });
    
    // 添加按钮（未满9张）
    if (currentImages.length < 9) {
        const btn = document.createElement('button');
        btn.type = 'button';
        btn.className = 'upload-btn';
        btn.textContent = '+';
        btn.onclick = selectImages;
        container.appendChild(btn);
    }
}

function removeImage(index) {
    currentImages.splice(index, 1);
    updateImagePreview();
}

function viewImage(src) {
    document.getElementById('viewerImage').src = src;
    document.getElementById('imageViewer').classList.add('active');
}

function closeImageViewer() {
    document.getElementById('imageViewer').classList.remove('active');
}

// ============ 渲染 ============
function renderEntries() {
    const container = document.getElementById('diaryList');
    
    if (entries.length === 0) {
        container.innerHTML = `
            <div class="empty-state">
                <div class="icon">📖</div>
                <h3>还没有日记</h3>
                <p>点击右下角 + 开始记录今天的故事</p>
            </div>
        `;
        return;
    }
    
    container.innerHTML = entries.map(entry => {
        const date = new Date(entry.createdAt);
        const weekdays = ['周日', '周一', '周二', '周三', '周四', '周五', '周六'];
        
        return `
            <div class="diary-entry">
                <div class="entry-header">
                    <div class="entry-date">
                        <span class="entry-day">${date.getDate()}</span>
                        <span class="entry-month-year">${date.getFullYear()}年${date.getMonth() + 1}月</span>
                    </div>
                    <span class="entry-weekday">${weekdays[date.getDay()]}</span>
                    <div class="entry-actions">
                        <button class="entry-btn" onclick="openEditModal('${entry.id}')">✏️</button>
                        <button class="entry-btn" onclick="deleteEntry('${entry.id}')">🗑️</button>
                    </div>
                </div>
                ${entry.title ? `<h3 style="margin-bottom: 10px; color: var(--navy);">${entry.title}</h3>` : ''}
                <div class="entry-content">${escapeHtml(entry.content)}</div>
                ${entry.images && entry.images.length ? `
                    <div class="entry-images">
                        ${entry.images.map(img => `
                            <div class="entry-image" onclick="viewImage('${img}')">
                                <img src="${img}" alt="">
                            </div>
                        `).join('')}
                    </div>
                ` : ''}
            </div>
        `;
    }).join('');
}

function escapeHtml(text) {
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
}

function updateStats() {
    document.getElementById('totalCount').textContent = entries.length;
    const imageCount = entries.reduce((sum, e) => sum + (e.images ? e.images.length : 0), 0);
    document.getElementById('imageCount').textContent = imageCount;
}

// ============ 工具函数 ============
function showLoading(show) {
    document.getElementById('loadingMask').classList.toggle('active', show);
}

function showToast(message) {
    const existing = document.querySelector('.toast');
    if (existing) existing.remove();
    
    const toast = document.createElement('div');
    toast.className = 'toast';
    toast.textContent = message;
    document.body.appendChild(toast);
    
    setTimeout(() => toast.remove(), 2500);
}

function closeModal(id) {
    document.getElementById(id).classList.remove('active');
}

document.querySelectorAll('.modal').forEach(modal => {
    modal.addEventListener('click', (e) => {
        if (e.target === modal) closeModal(modal.id);
    });
});

document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') {
        document.querySelectorAll('.modal.active').forEach(m => closeModal(m.id));
        closeImageViewer();
    }
});

// ============ PDF 导出功能 ============

function openExportModal() {
    // 设置默认日期范围（本月）
    const now = new Date();
    const firstDay = new Date(now.getFullYear(), now.getMonth(), 1);
    
    document.getElementById('exportStartDate').value = formatDateForInput(firstDay);
    document.getElementById('exportEndDate').value = formatDateForInput(now);
    
    updateExportPreview();
    document.getElementById('exportModal').classList.add('active');
    
    // 监听日期变化
    document.getElementById('exportStartDate').onchange = updateExportPreview;
    document.getElementById('exportEndDate').onchange = updateExportPreview;
}

function formatDateForInput(date) {
    return date.toISOString().split('T')[0];
}

function updateExportPreview() {
    const startDate = new Date(document.getElementById('exportStartDate').value);
    const endDate = new Date(document.getElementById('exportEndDate').value);
    endDate.setHours(23, 59, 59, 999); // 包含结束日当天
    
    const filtered = entries.filter(e => {
        const entryDate = new Date(e.createdAt);
        return entryDate >= startDate && entryDate <= endDate;
    });
    
    const previewList = document.getElementById('previewList');
    const previewCount = document.getElementById('previewCount');
    const generateBtn = document.getElementById('generateBtn');
    
    previewCount.textContent = `${filtered.length} 篇日记`;
    generateBtn.disabled = filtered.length === 0;
    
    if (filtered.length === 0) {
        previewList.innerHTML = '<div style="color: var(--text-light); text-align: center; padding: 20px;">该时间段没有日记</div>';
        return;
    }
    
    previewList.innerHTML = filtered.slice(0, 5).map(e => {
        const date = new Date(e.createdAt);
        const title = e.title || '无标题';
        return `
            <div class="preview-item">
                <span class="preview-date">${date.getMonth() + 1}/${date.getDate()}</span>
                <span class="preview-title">${title}</span>
            </div>
        `;
    }).join('') + (filtered.length > 5 ? `<div style="text-align: center; color: var(--text-light); padding-top: 8px;">还有 ${filtered.length - 5} 篇...</div>` : '');
}

async function generatePDF() {
    const startDate = new Date(document.getElementById('exportStartDate').value);
    const endDate = new Date(document.getElementById('exportEndDate').value);
    endDate.setHours(23, 59, 59, 999);
    
    const includeImages = document.getElementById('includeImages').checked;
    const includeTitle = document.getElementById('includeTitle').checked;
    
    const filtered = entries.filter(e => {
        const entryDate = new Date(e.createdAt);
        return entryDate >= startDate && entryDate <= endDate;
    }).sort((a, b) => new Date(a.createdAt) - new Date(b.createdAt)); // 按时间正序
    
    closeModal('exportModal');
    document.getElementById('pdfProgressModal').classList.add('active');
    
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF('p', 'mm', 'a4');
    
    // 封面
    doc.setFontSize(24);
    doc.text('我的日记', 105, 60, { align: 'center' });
    
    doc.setFontSize(12);
    doc.setTextColor(100);
    const dateRangeText = `${formatDateCN(startDate)} - ${formatDateCN(endDate)}`;
    doc.text(dateRangeText, 105, 80, { align: 'center' });
    doc.text(`共 ${filtered.length} 篇`, 105, 90, { align: 'center' });
    
    doc.addPage();
    
    // 生成内容
    for (let i = 0; i < filtered.length; i++) {
        const entry = filtered[i];
        const progress = ((i + 1) / filtered.length * 100).toFixed(0);
        
        updatePDFProgress(progress, `正在生成第 ${i + 1}/${filtered.length} 页...`);
        
        // 检查是否需要新页面
        if (i > 0) {
            doc.addPage();
        }
        
        // 日期标题
        const date = new Date(entry.createdAt);
        doc.setFontSize(10);
        doc.setTextColor(150);
        doc.text(formatDateCN(date) + ' ' + getWeekday(date), 20, 20);
        
        // 标题
        let yPos = 35;
        if (includeTitle && entry.title) {
            doc.setFontSize(16);
            doc.setTextColor(50);
            doc.text(entry.title, 20, yPos);
            yPos += 12;
        }
        
        // 内容
        doc.setFontSize(11);
        doc.setTextColor(80);
        const contentLines = doc.splitTextToSize(entry.content, 170);
        doc.text(contentLines, 20, yPos);
        yPos += contentLines.length * 6 + 10;
        
        // 图片
        if (includeImages && entry.images && entry.images.length) {
            for (let j = 0; j < Math.min(entry.images.length, 3); j++) {
                if (yPos > 250) {
                    doc.addPage();
                    yPos = 30;
                }
                
                try {
                    const imgData = await loadImage(entry.images[j]);
                    const imgWidth = 60;
                    const imgHeight = 60;
                    doc.addImage(imgData, 'JPEG', 20 + j * 65, yPos, imgWidth, imgHeight);
                } catch (e) {
                    console.error('图片加载失败:', e);
                }
            }
        }
    }
    
    // 保存
    const fileName = `日记_${formatDateForInput(startDate)}_至_${formatDateForInput(endDate)}.pdf`;
    doc.save(fileName);
    
    closeModal('pdfProgressModal');
    showToast('✅ PDF 导出成功');
}

function updatePDFProgress(percent, status) {
    document.getElementById('pdfProgress').style.width = percent + '%';
    document.getElementById('pdfStatus').textContent = status;
}

function formatDateCN(date) {
    return `${date.getFullYear()}年${date.getMonth() + 1}月${date.getDate()}日`;
}

function getWeekday(date) {
    const weekdays = ['周日', '周一', '周二', '周三', '周四', '周五', '周六'];
    return weekdays[date.getDay()];
}

function loadImage(src) {
    return new Promise((resolve, reject) => {
        const img = new Image();
        img.crossOrigin = 'anonymous';
        img.onload = () => {
            const canvas = document.createElement('canvas');
            canvas.width = img.width;
            canvas.height = img.height;
            canvas.getContext('2d').drawImage(img, 0, 0);
            resolve(canvas.toDataURL('image/jpeg', 0.8));
        };
        img.onerror = reject;
        img.src = src;
    });
}
